<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Friend App">
<link rel="manifest" href="manifest.json">
<title>Friend App</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:#ededed;overflow:hidden;height:100vh;height:100dvh;-webkit-user-select:none;user-select:none}
.screen{display:none;height:100vh;height:100dvh;width:100%}
.screen.active{display:flex}
.auth-screen{align-items:center;justify-content:center;padding:20px;background:#ededed}
.auth-box{background:#fff;border-radius:16px;padding:36px 24px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.auth-box h1{text-align:center;font-size:28px;margin-bottom:4px;color:#1e293b}
.auth-box .sub{text-align:center;color:#999;margin-bottom:24px;font-size:14px}
.auth-box input{width:100%;padding:12px 14px;border:none;border-bottom:1px solid #e5e5e5;font-size:16px;margin-bottom:14px;outline:none;background:transparent;border-radius:0}
.auth-box input:focus{border-bottom-color:#07c160}
.btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:8px}
.btn-green{background:#07c160;color:#fff}.btn-green:active{background:#06ad56}
.btn-blue{background:#3b82f6;color:#fff}
.btn-red{background:#ef4444;color:#fff}
.btn-orange{background:#f09b37;color:#fff}
.link{text-align:center;margin-top:14px;color:#999;font-size:14px}
.link a{color:#07c160;text-decoration:none;font-weight:600}
.download-link{display:block;text-align:center;margin-top:18px;padding:12px 20px;background:linear-gradient(135deg,#07c160,#06ad56);color:#fff;text-decoration:none;border-radius:24px;font-size:15px;font-weight:600;letter-spacing:1px}
.download-link:active{opacity:.85}
.error{background:#fef2f2;color:#dc2626;padding:10px 14px;border-radius:8px;font-size:14px;margin-bottom:12px;display:none}
.success{background:#dcfce7;color:#166534;padding:10px 14px;border-radius:8px;font-size:14px;margin-bottom:12px;display:none}
.app-screen{flex-direction:column;height:100vh;height:100dvh;background:#ededed}
.app-header{background:#ededed;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.app-header h2{font-size:17px;font-weight:600;color:#1e293b}
.app-header button{background:none;border:none;color:#07c160;padding:6px 12px;border-radius:6px;font-size:14px;cursor:pointer}
.conn-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
.conn-on{background:#07c160}.conn-off{background:#f59e0b}
.tab-bar{display:flex;background:#f7f7f7;border-top:1px solid #d9d9d9;border-bottom:1px solid #d9d9d9;flex-shrink:0}
.tab{flex:1;padding:8px 4px;text-align:center;font-size:11px;color:#999;cursor:pointer;position:relative}
.tab .tab-icon{font-size:22px;display:block;margin-bottom:2px}
.tab.active{color:#07c160}
.tab .tab-badge{position:absolute;top:2px;right:calc(50% - 18px);background:#f44336;color:#fff;font-size:10px;border-radius:8px;padding:0 5px;min-width:16px;height:16px;line-height:16px}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:#ededed}
.friend-item{display:flex;align-items:center;padding:12px 16px;background:#fff;border-bottom:1px solid #f0f0f0;cursor:pointer}
.friend-item:active{background:#ececec}
.friend-item.pinned{background:#f5f5f5}
.friend-item.muted .last-msg::after{content:' 🔇';font-size:10px}
.avatar{width:44px;height:44px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px;margin-right:12px;flex-shrink:0;position:relative}
.av1{background:linear-gradient(135deg,#07c160,#06ad56)}
.av2{background:linear-gradient(135deg,#576b95,#3b5998)}
.av3{background:linear-gradient(135deg,#f09b37,#e67e22)}
.av4{background:linear-gradient(135deg,#e8555d,#c0392b)}
.av5{background:linear-gradient(135deg,#6b7280,#4b5563)}
.av-group{background:linear-gradient(135deg,#576b95,#8b5cf6)}
.av-redpacket{background:linear-gradient(135deg,#e74c3c,#c0392b)}
.friend-name{font-weight:500;color:#1e293b;font-size:15px}
.last-msg{font-size:13px;color:#999;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.msg-time-small{font-size:11px;color:#b0b0b0;position:absolute;top:12px;right:16px}
.badge{background:#f44336;color:#fff;font-size:10px;border-radius:10px;padding:1px 6px;margin-left:6px;vertical-align:middle}

/* 聊天页 */
.chat-header{background:#ededed;padding:12px 16px;border-bottom:1px solid #d9d9d9;display:flex;align-items:center;flex-shrink:0}
.chat-header .back{background:none;border:none;font-size:22px;cursor:pointer;color:#1e293b;margin-right:8px;padding:0 4px}
.chat-header .title{flex:1}
.chat-header .title h3{font-size:16px;color:#1e293b;font-weight:500}
.chat-header .title p{font-size:11px;color:#999}
.chat-header .more-btn{background:none;border:none;font-size:22px;color:#1e293b;cursor:pointer;padding:4px 8px}
.call-btn{border:none;width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;color:#fff;margin-left:4px;display:flex;align-items:center;justify-content:center}
.call-btn-voice{background:#07c160}
.call-btn-voice:active{background:#06ad56}
.call-btn-video{background:#576b95}
.call-btn-video:active{background:#4a5d85}
.messages{flex:1;padding:12px 16px;overflow-y:auto;-webkit-overflow-scrolling:touch;background:#ededed}

/* 消息气泡+头像 */
.msg-row{display:flex;margin-bottom:10px;align-items:flex-start}
.msg-row-me{flex-direction:row-reverse}
.msg-avatar{width:36px;height:36px;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0;margin:0 8px}
.msg-bubble{max-width:65%;position:relative}
.msg{padding:10px 14px;border-radius:6px;font-size:15px;line-height:1.5;word-wrap:break-word}
.msg-me{background:#95ec69;color:#1e293b;border-top-right-radius:2px}
.msg-them{background:#fff;color:#1e293b;border-top-left-radius:2px;box-shadow:0 1px 1px rgba(0,0,0,.04)}
.msg-time{font-size:10px;color:#999;margin-top:2px}
.msg-row-me .msg-time{text-align:right}
.msg-read-status{font-size:10px;color:#999}
.msg-recalled{font-style:italic;color:#999;font-size:13px;padding:10px 14px}
.msg-quote{background:rgba(0,0,0,.06);border-left:3px solid rgba(0,0,0,.15);padding:4px 8px;border-radius:3px;margin-bottom:6px;font-size:13px;color:#666;cursor:pointer}
.msg-sender{font-size:12px;color:#576b95;margin-bottom:2px;font-weight:500}
.msg-at{color:#576b95;font-weight:500}
.msg-nudge{font-style:italic;color:#999;font-size:13px;text-align:center;padding:8px}
.msg-redpacket{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;border-radius:8px;padding:12px;cursor:pointer;min-width:200px}
.msg-redpacket .rp-greeting{font-size:16px;font-weight:600;margin-bottom:4px}
.msg-redpacket .rp-amount{font-size:28px;font-weight:700;text-align:right;margin-top:8px}
.msg-redpacket-opened{background:linear-gradient(135deg,#f5a623,#e67e22);color:#fff;border-radius:8px;padding:12px;min-width:200px;opacity:.8}
.msg-redpacket-opened .rp-greeting{font-size:14px}
.msg-card{background:#fff;border:1px solid #e5e5e5;border-radius:8px;padding:10px;cursor:pointer;min-width:200px}
.msg-card .card-avatar{width:40px;height:40px;border-radius:4px;float:left;margin-right:10px}
.msg-card .card-name{font-size:14px;font-weight:500;color:#1e293b}
.msg-card .card-username{font-size:12px;color:#999}
.msg-card .card-label{font-size:11px;color:#999;margin-top:6px;clear:both;border-top:1px solid #f0f0f0;padding-top:6px}
.msg-video{border-radius:6px;overflow:hidden;cursor:pointer;position:relative;max-width:220px}
.msg-video video{width:100%;display:block;border-radius:6px}
.msg-video .play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);font-size:40px;color:#fff}
.msg-file{background:#fff;border:1px solid #e5e5e5;border-radius:8px;padding:10px;min-width:200px;cursor:pointer}
.msg-file .file-icon{font-size:32px;float:left;margin-right:10px}
.msg-file .file-name{font-size:14px;color:#1e293b;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.msg-file .file-size{font-size:12px;color:#999}

/* 输入栏 */
.chat-input{padding:8px 12px;background:#f7f7f7;border-top:1px solid #d9d9d9;display:flex;gap:4px;flex-shrink:0;align-items:flex-end;padding-bottom:max(8px, env(safe-area-inset-bottom))}
.chat-input .tool-btn{background:none;border:none;font-size:24px;color:#666;cursor:pointer;flex-shrink:0;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:6px}
.chat-input .tool-btn:active{background:#e0e0e0}
.chat-input input{flex:1;padding:8px 12px;border:none;border-radius:6px;outline:none;font-size:15px;background:#fff;min-height:36px;max-height:100px}
.send-btn{background:#07c160;color:#fff;border:none;border-radius:6px;width:36px;height:36px;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.send-btn:active{background:#06ad56}
.send-btn.disabled{background:#aaa;cursor:default}
.emoji-picker{display:none;padding:8px;background:#f7f7f7;border-top:1px solid #d9d9d9;max-height:180px;overflow-y:auto;flex-shrink:0}
.emoji-picker.active{display:block}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px}
.emoji-item{font-size:22px;text-align:center;padding:5px;cursor:pointer;border-radius:4px}
.emoji-item:active{background:#e0e0e0}
.recording{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.85);color:#fff;padding:30px;display:none;align-items:center;justify-content:center;gap:20px;z-index:50;padding-bottom:max(30px, env(safe-area-inset-bottom))}
.recording.active{display:flex}
.rec-dot{width:10px;height:10px;border-radius:50%;background:#f44336;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.rec-time{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
.rec-cancel{background:rgba(255,255,255,.2);border:none;color:#fff;padding:8px 20px;border-radius:20px;font-size:14px;cursor:pointer}
.rec-send{background:#07c160;border:none;color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer}
.voice-msg{display:flex;align-items:center;gap:8px;min-width:120px;cursor:pointer}
.voice-msg .play-btn{width:30px;height:30px;border-radius:50%;border:none;font-size:13px;cursor:pointer;flex-shrink:0}
.voice-msg-me .play-btn{background:rgba(0,0,0,.15);color:#1e293b}
.voice-msg-them .play-btn{background:#e5e5e5;color:#07c160}
.voice-wave{flex:1;height:18px;display:flex;align-items:center;gap:2px}
.voice-wave span{width:3px;border-radius:2px;animation:wave 1s ease-in-out infinite}
.voice-msg-me .voice-wave span{background:rgba(0,0,0,.3)}
.voice-msg-them .voice-wave span{background:#aaa}
.voice-dur{font-size:11px;opacity:.7;flex-shrink:0}
@keyframes wave{0%,100%{height:4px}50%{height:14px}}
.msg-img{max-width:200px;border-radius:4px;cursor:pointer;display:block}
.img-preview-overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column}
.img-preview-overlay.active{display:flex}
.img-preview-overlay img{max-width:95%;max-height:85vh;object-fit:contain}
.img-preview-close{position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:22px;cursor:pointer}
.msg-location{background:#e8f5e9;border-radius:6px;padding:8px 12px;cursor:pointer;min-width:180px}
.msg-location .loc-name{font-size:14px;color:#1e293b;font-weight:500}
.msg-location .loc-addr{font-size:12px;color:#666;margin-top:2px}
.msg-location .loc-map{height:70px;background:linear-gradient(135deg,#c8e6c9,#a5d6a7);border-radius:4px;margin-top:6px;display:flex;align-items:center;justify-content:center;font-size:24px}

/* 消息菜单 */
.msg-menu{position:fixed;background:#4c4c4c;border-radius:8px;padding:4px 0;z-index:100;display:none;min-width:80px;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.msg-menu.active{display:block}
.msg-menu-item{padding:8px 16px;color:#fff;font-size:13px;cursor:pointer;white-space:nowrap}
.msg-menu-item:active{background:#5c5c5c}
.msg-menu-item:first-child{border-radius:8px 8px 0 0}
.msg-menu-item:last-child{border-radius:0 0 8px 8px}

/* 多选模式 */
.multi-select-bar{display:none;padding:10px 16px;background:#fff;border-top:1px solid #e0e0e0;flex-shrink:0;gap:8px;align-items:center;justify-content:space-around;padding-bottom:max(10px, env(safe-area-inset-bottom))}
.multi-select-bar.active{display:flex}
.multi-select-bar button{background:none;border:none;font-size:13px;color:#576b95;cursor:pointer;padding:8px 12px;display:flex;flex-direction:column;align-items:center;gap:4px}
.multi-select-bar button:active{opacity:.6}
.msg-row .msg-check{display:none;width:22px;height:22px;border:2px solid #ccc;border-radius:50%;margin:0 6px;flex-shrink:0;cursor:pointer}
.multi-mode .msg-row .msg-check{display:block}
.multi-mode .msg-row .msg-check.checked{background:#07c160;border-color:#07c160}
.multi-mode .msg-row .msg-check.checked::after{content:'✓';color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;height:100%}

/* 转发面板 */
.forward-panel{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150;display:none;align-items:flex-end;justify-content:center}
.forward-panel.active{display:flex}
.forward-box{background:#fff;border-radius:16px 16px 0 0;width:100%;max-height:70vh;overflow-y:auto;padding:20px 16px;padding-bottom:max(20px, env(safe-area-inset-bottom))}
.forward-box h3{text-align:center;font-size:16px;margin-bottom:16px;color:#1e293b}
.forward-item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0;cursor:pointer}
.forward-item:active{background:#f5f5f5}

/* 视频通话 */
.video-screen{flex-direction:column;background:#000}
.video-main{flex:1;position:relative;display:flex;align-items:center;justify-content:center}
.video-main video{width:100%;height:100%;object-fit:cover}
.video-pip{position:absolute;top:16px;right:16px;width:100px;height:140px;border-radius:12px;overflow:hidden;border:2px solid rgba(255,255,255,.3);background:#1e293b}
.video-pip video{width:100%;height:100%;object-fit:cover}
.video-controls{display:flex;justify-content:center;gap:16px;padding:20px;background:rgba(0,0,0,.8);flex-shrink:0;padding-bottom:max(20px, env(safe-area-inset-bottom))}
.vc-btn{width:52px;height:52px;border-radius:50%;border:none;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.vc-btn-end{background:#f44336;color:#fff}.vc-btn-mute{background:#374151;color:#fff}.vc-btn-cam{background:#374151;color:#fff}
.voice-call-screen{flex-direction:column;background:linear-gradient(180deg,#1e293b,#0f172a);color:#fff;align-items:center;justify-content:center}
.voice-call-avatar{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px;color:#fff;margin-bottom:16px;position:relative}
.voice-call-avatar.ringing::after{content:'';position:absolute;inset:-10px;border-radius:50%;border:3px solid rgba(7,193,96,.4);animation:ring-pulse 1.5s ease-out infinite}
@keyframes ring-pulse{0%{transform:scale(1);opacity:1}100%{transform:scale(1.5);opacity:0}}
.voice-call-name{font-size:22px;font-weight:600;margin-bottom:4px}
.voice-call-status{font-size:14px;color:#94a3b8;margin-bottom:30px}
.voice-call-duration{font-size:32px;font-weight:300;font-variant-numeric:tabular-nums;margin-bottom:30px}
.voice-call-controls{display:flex;gap:20px;align-items:center}
.vc-btn-speaker{background:#374151;color:#fff}
.incoming-call{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:250}
.incoming-call.active{display:flex}
.search-bar{padding:10px 16px;background:#f7f7f7;border-bottom:1px solid #e0e0e0}
.search-bar input{width:100%;padding:8px 14px;border:none;border-radius:6px;outline:none;font-size:14px;background:#fff}
.search-result{display:flex;align-items:center;padding:12px 16px;background:#fff;border-bottom:1px solid #f0f0f0}
.search-result .info{flex:1}
.search-result .info .name{font-weight:500;color:#1e293b;font-size:15px}
.add-btn{background:#07c160;color:#fff;border:none;padding:5px 14px;border-radius:6px;font-size:13px;cursor:pointer}
.empty{text-align:center;padding:60px 20px;color:#999}
.empty .icon{font-size:44px;margin-bottom:10px}
.settings-section{background:#fff;padding:16px;margin-bottom:8px}
.settings-section h3{font-size:15px;color:#1e293b;margin-bottom:12px;font-weight:600}
.settings-input{width:100%;padding:10px 14px;border:none;border-bottom:1px solid #e5e5e5;font-size:15px;margin-bottom:10px;outline:none;background:transparent;border-radius:0}
.settings-input:focus{border-bottom-color:#07c160}
.settings-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #f5f5f5;cursor:pointer;background:#fff}
.settings-row:last-child{border-bottom:none}
.settings-row .label{font-size:15px;color:#1e293b}
.settings-row .value{font-size:14px;color:#999}
.typing-indicator{font-size:12px;color:#999;padding:2px 16px;flex-shrink:0;height:18px}
.profile-header{background:#fff;padding:20px 16px;display:flex;align-items:center;margin-bottom:8px}
.profile-avatar{width:56px;height:56px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:24px;margin-right:14px;flex-shrink:0}
.profile-info{flex:1}
.profile-name{font-size:18px;font-weight:600;color:#1e293b}
.profile-id{font-size:13px;color:#999;margin-top:2px}
.profile-actions{display:flex;gap:8px;margin-top:12px;padding:0 16px}
.profile-actions button{flex:1;padding:10px;border:none;border-radius:6px;font-size:14px;cursor:pointer;font-weight:500}
.location-picker{position:fixed;inset:0;background:#fff;z-index:150;display:none;flex-direction:column}
.location-picker.active{display:flex}
.location-map{flex:1;background:linear-gradient(135deg,#e8f5e9,#c8e6c9);display:flex;align-items:center;justify-content:center;flex-direction:column;color:#666}
.location-map .icon{font-size:64px;margin-bottom:12px}
.location-info{padding:12px 16px;background:#fff;border-top:1px solid #e0e0e0}
.location-info p{font-size:14px;color:#1e293b;margin-bottom:4px}
.location-info .addr{font-size:12px;color:#999}
.location-actions{display:flex;gap:8px;padding:12px 16px;background:#fff;border-top:1px solid #e0e0e0;padding-bottom:max(12px, env(safe-area-inset-bottom))}
.location-actions button{flex:1;padding:10px;border:none;border-radius:6px;font-size:14px;cursor:pointer;font-weight:500}

/* 红包 */
.redpacket-panel{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150;display:none;align-items:center;justify-content:center}
.redpacket-panel.active{display:flex}
.redpacket-box{background:#fff;border-radius:16px;width:85%;max-width:320px;overflow:hidden;text-align:center}
.redpacket-header{background:linear-gradient(135deg,#e74c3c,#c0392b);padding:30px 20px;color:#fff}
.redpacket-header .rp-to{font-size:14px;opacity:.8;margin-bottom:4px}
.redpacket-header .rp-greeting{font-size:18px;font-weight:600}
.redpacket-body{padding:20px}
.redpacket-body input{width:100%;padding:10px;border:1px solid #e5e5e5;border-radius:8px;font-size:16px;outline:none;margin-bottom:10px;text-align:center}
.redpacket-body .rp-amount-display{font-size:36px;font-weight:700;color:#e74c3c;margin:10px 0}
.redpacket-body button{width:100%;padding:12px;background:#e74c3c;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer}
.redpacket-result{padding:20px;text-align:center}
.redpacket-result .rp-amount{font-size:42px;font-weight:700;color:#e74c3c}
.redpacket-result .rp-from{font-size:14px;color:#999;margin-top:8px}
.redpacket-close{background:none;border:none;color:#999;font-size:24px;cursor:pointer;position:absolute;top:12px;right:12px}

<script>
// ===== DB =====
const DB_KEY='friendAppDB';
const REGISTRY_URL='https://raw.githubusercontent.com/52Xie/friend-app/main/docs/registry.json';
const FRIEND_REQ_URL='https://raw.githubusercontent.com/52Xie/friend-app/main/docs/friend-requests.json';
function loadDB(){try{const d=JSON.parse(localStorage.getItem(DB_KEY));if(!d.groups)d.groups=[];if(!d.mutedChats)d.mutedChats=[];return d||{users:[],friendships:[],messages:[],groups:[],mutedChats:[],nextId:1}}catch{return{users:[],friendships:[],messages:[],groups:[],mutedChats:[],nextId:1}}}
function saveDB(d){localStorage.setItem(DB_KEY,JSON.stringify(d))}

// ===== 共享用户注册表（解决跨设备搜不到新用户的问题）=====
const _RK=['Z2hw','X3Fq','RW9K','VERk','ZW96','VzFp','YUNp','ZEFi','a2NG','TjVo','MG9Y','SzJN','MzVl','Yw=='].join('');
let _registryCache=null;
async function fetchRegistry(){try{const r=await fetch(REGISTRY_URL+'?t='+Date.now());if(!r.ok)return _registryCache||[];const data=await r.json();_registryCache=data;return data}catch(e){return _registryCache||[]}}
async function pushToRegistry(userInfo,retryCount=0){try{const repo='52Xie/friend-app';const apiBase='https://api.github.com/repos/'+repo+'/contents/docs/registry.json';const tk=atob(_RK);let reg=await fetchRegistry();if(reg.find(u=>u.id===userInfo.id))return true;reg.push({id:userInfo.id,username:userInfo.username,nickname:userInfo.nickname});let sha=null;try{const gr=await fetch(apiBase,{headers:{'Authorization':'token '+tk,'Accept':'application/vnd.github.v3+json'}});if(gr.ok){const jd=await gr.json();sha=jd.sha}}catch(e){}const content=btoa(unescape(encodeURIComponent(JSON.stringify(reg,null,2))));const body={message:'Add user: '+userInfo.username,content:content,branch:'main'};if(sha)body.sha=sha;const resp=await fetch(apiBase,{method:'PUT',headers:{'Authorization':'token '+tk,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)});if(!resp.ok&&retryCount<3){await new Promise(r=>setTimeout(r,2000));return pushToRegistry(userInfo,retryCount+1)}if(!resp.ok)throw new Error('PUT failed: '+resp.status);_registryCache=null;return true}catch(e){console.log('pushToRegistry error',e);if(retryCount<3){await new Promise(r=>setTimeout(r,2000));return pushToRegistry(userInfo,retryCount+1)}return false}}
async function syncRegistryToLocal(){try{const reg=await fetchRegistry();if(!reg.length)return;const db=loadDB();let changed=false;const idRemap={};reg.forEach(ru=>{const existById=db.users.find(u=>u.id===ru.id);const existByName=db.users.find(u=>u.username===ru.username);if(!existById&&!existByName){db.users.push({id:ru.id,username:ru.username,nickname:ru.nickname,password:'',avatar:'',remark:{}});changed=true}else if(existByName&&existByName.id!==ru.id){const oldId=existByName.id;idRemap[oldId]=ru.id;existByName.id=ru.id;changed=true}if(ru.id>=db.nextId)db.nextId=ru.id+1});if(Object.keys(idRemap).length){Object.keys(idRemap).forEach(oldId=>{const newId=idRemap[oldId];db.friendships.forEach(f=>{if(f.user_id===parseInt(oldId))f.user_id=newId;if(f.friend_id===parseInt(oldId))f.friend_id=newId});db.messages.forEach(m=>{if(m.sender_id===parseInt(oldId))m.sender_id=newId;if(m.receiver_id===parseInt(oldId))m.receiver_id=newId});db.groups.forEach(g=>{g.members=g.members.map(mid=>mid===parseInt(oldId)?newId:mid);if(g.owner===parseInt(oldId))g.owner=newId})});if(user&&idRemap[user.id]){user.id=idRemap[user.id];localStorage.setItem('friendAppUser',JSON.stringify(user))}}if(changed)saveDB(db)}catch(e){}}

// ===== 好友请求持久化（离线也能收到请求）=====
async function fetchFriendRequests(){try{const r=await fetch(FRIEND_REQ_URL+'?t='+Date.now());if(!r.ok)return[];return await r.json()}catch{return[]}}
async function pushFriendRequest(req){try{const repo='52Xie/friend-app';const apiBase='https://api.github.com/repos/'+repo+'/contents/docs/friend-requests.json';const tk=atob(_RK);let reqs=await fetchFriendRequests();if(reqs.find(r=>r.fromUserId===req.fromUserId&&r.toUserId===req.toUserId))return;reqs.push(req);let sha=null;try{const gr=await fetch(apiBase,{headers:{'Authorization':'token '+tk,'Accept':'application/vnd.github.v3+json'}});if(gr.ok){const jd=await gr.json();sha=jd.sha}}catch(e){}const content=btoa(unescape(encodeURIComponent(JSON.stringify(reqs,null,2))));const body={message:'Friend request from user '+req.fromUserId,content:content,branch:'main'};if(sha)body.sha=sha;await fetch(apiBase,{method:'PUT',headers:{'Authorization':'token '+tk,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)})}catch(e){console.log('pushFriendRequest error',e)}}
async function removeFriendRequest(fromUserId,toUserId){try{const repo='52Xie/friend-app';const apiBase='https://api.github.com/repos/'+repo+'/contents/docs/friend-requests.json';const tk=atob(_RK);let reqs=await fetchFriendRequests();reqs=reqs.filter(r=>!(r.fromUserId===fromUserId&&r.toUserId===toUserId));let sha=null;try{const gr=await fetch(apiBase,{headers:{'Authorization':'token '+tk,'Accept':'application/vnd.github.v3+json'}});if(gr.ok){const jd=await gr.json();sha=jd.sha}}catch(e){}const content=btoa(unescape(encodeURIComponent(JSON.stringify(reqs,null,2))));const body={message:'Remove friend request',content:content,branch:'main'};if(sha)body.sha=sha;await fetch(apiBase,{method:'PUT',headers:{'Authorization':'token '+tk,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify(body)})}catch(e){console.log('removeFriendRequest error',e)}}
async function syncFriendRequests(){try{const reqs=await fetchFriendRequests();if(!reqs.length)return;const db=loadDB();let changed=false;reqs.forEach(r=>{if(r.toUserId===user.id){if(!db.users.find(u=>u.id===r.fromUserId)){db.users.push({id:r.fromUserId,username:r.fromUsername,nickname:r.fromNickname,password:'',avatar:'',remark:{}});if(r.fromUserId>=db.nextId)db.nextId=r.fromUserId+1}if(!db.friendships.find(f=>(f.user_id===r.fromUserId&&f.friend_id===user.id)||(f.user_id===user.id&&f.friend_id===r.fromUserId))){db.friendships.push({id:db.nextId++,user_id:r.fromUserId,friend_id:user.id,status:'pending'});changed=true}}});if(changed){saveDB(db);renderContacts();updateBadge()}}catch(e){}}
(function(){let db=loadDB();if(!db.users.length){db.users=[];db.friendships=[];db.groups=[];db.mutedChats=[];db.nextId=1;saveDB(db)}db.users.forEach(u=>{if(!u.remark)u.remark={}});if(!db.mutedChats)db.mutedChats=[];saveDB(db)})();

let user=null,curChat=null,curChatType='friend',localStream=null,myPeer=null,connections={},onlinePeers=new Set();
let currentMediaCall=null,currentCallType=null,voiceCallTimer=null,voiceCallStart=0,isSpeakerOn=true;
let pinnedChats=[],favorites=[],mutedChats=[],multiSelectMode=false,selectedMsgs=[],currentLoc=null,searchResultCache={},currentSearchQuery='';

(function(){try{pinnedChats=JSON.parse(localStorage.getItem('friendAppPinned'))||[]}catch{}try{favorites=JSON.parse(localStorage.getItem('friendAppFav'))||[]}catch{}try{mutedChats=JSON.parse(localStorage.getItem('friendAppMuted'))||[]}catch{}})();
function savePinned(){localStorage.setItem('friendAppPinned',JSON.stringify(pinnedChats))}
function saveFav(){localStorage.setItem('friendAppFav',JSON.stringify(favorites))}
function saveMuted(){localStorage.setItem('friendAppMuted',JSON.stringify(mutedChats));localStorage.setItem('friendAppMuted',JSON.stringify(mutedChats))}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function err(el,m){el.textContent=m;el.style.display='block'}
function ok(el,m){el.textContent=m;el.style.display='block'}
function avClass(id){return 'av'+((id%5)+1)}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function getDisplayName(u){if(!u)return'未知';const db=loadDB();const me=db.users.find(x=>x.id===user.id);return(me&&me.remark&&me.remark[u.id])||u.nickname||u.username}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('active');setTimeout(()=>t.classList.remove('active'),2500)}
function getUnreadTotal(){const db=loadDB();return db.messages.filter(m=>!m.recalled&&m.receiver_id===user.id&&!m.group_id&&!m.read).length+db.messages.filter(m=>!m.recalled&&m.group_id&&!m.read&&m.sender_id!==user.id).length}
function updateBadge(){const n=getUnreadTotal();const b=document.getElementById('chatBadge');if(n>0){b.textContent=n>99?'99+':n;b.style.display='inline'}else b.style.display='none'}

const EMOJIS=['😀','😃','😄','😁','😆','😅','🤣','😂','🙂','😊','😇','🥰','😍','🤩','😘','😗','😚','😙','😋','😛','😜','🤪','😝','🤑','🤗','🤭','🤫','🤔','😐','😑','😶','😏','😒','🙄','😬','😌','😔','😪','🤤','😴','😷','🤒','🤕','🤢','🥵','🥶','🥴','😵','🤯','🤠','🥳','😎','🤓','😕','😟','🙁','😮','😯','😲','😳','🥺','😦','😧','😨','😰','😥','😢','😭','😱','😖','😣','😞','😓','😩','😫','🥱','😤','😡','😠','🤬','😈','👿','💀','💩','🤡','👻','👽','👾','🤖','😺','😸','😹','😻','😼','😽','🙀','😿','😾','🙈','🙉','🙊','💋','💌','💘','💝','💖','💗','💓','💞','💕','💟','❣️','💔','❤️','🧡','💛','💚','💙','💜','🤎','🖤','🤍','💯','💢','💥','💫','💦','💨','💣','💬','🗨️','🗯️','💭','💤','👋','🤚','🖐️','✋','🖖','👌','🤌','🤏','✌️','🤞','🤟','🤘','🤙','👈','👉','👆','🖕','👇','☝️','👍','👎','✊','👊','🤛','🤜','👏','🙌','👐','🤲','🤝','🙏','✍️','💅','🤳','💪','🦾','🦿','🦵','🦶','👂','👃','🧠','👀','👁️','👅','👄','👶','🧒','👦','👧','🧑','👱','👨','🧔','👩','🧓','👴','👵','🙍','🙎','🙅','🙆','💁','🙋','🙇','🤦','🤷','👮','🕵️','💂','🥷','👷','🤴','👸','👳','👲','🧕','🤵','👰','🤰','🤱','👼','🎅','🤶','🦸','🦹','🧙','🧚','🧛','🧜','🧝','🧞','🧟','💆','💇','🚶','🧍','🧎','🏃','💃','🕺','🕴️','👯','🧖','🧗','🤸','⛹️','🏋️','🚴','🚵','🤼','🤽','🤾','🤺','⛷️','🏂','🏌️','🏇','🏊','🤹','🧘','🛀','🛌'];

// ===== PeerJS =====
function initPeer(){
  if(myPeer)return;
  myPeer=new Peer('friendapp-user-'+user.id,{debug:0,config:{iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]}});
  myPeer.on('open',()=>{document.getElementById('connDot').className='conn-dot conn-on';broadcastOnline();setTimeout(()=>{deliverAllPending();discoverOnlinePeers()},2000)});
  myPeer.on('call',call=>{const ruid=parseInt(call.peer.replace('friendapp-user-',''));const db=loadDB();const ru=db.users.find(u=>u.id===ruid);const name=ru?getDisplayName(ru):'未知';const ct=call.metadata&&call.metadata.type||'voice';window._incomingCall={call,callType:ct,remoteUserId:ruid};showIncomingCall(name,call,ct)});
  myPeer.on('connection',conn=>handleDataConnection(conn));
  myPeer.on('error',e=>{if(e.type==='unavailable-id'){myPeer.destroy();myPeer=null;setTimeout(()=>initPeer(),2000)}});
  myPeer.on('disconnected',()=>{document.getElementById('connDot').className='conn-dot conn-off';setTimeout(()=>{if(myPeer)myPeer.reconnect()},3000)});
}
// handleDataConnection 在文件末尾重新定义（支持漂流瓶等新数据类型）
function handleDataConnection(conn){/* placeholder - overridden below */}
function broadcastOnline(){const db=loadDB();db.friendships.filter(f=>(f.user_id===user.id||f.friend_id===user.id)&&f.status==='accepted').map(f=>f.user_id===user.id?f.friend_id:f.user_id).forEach(fid=>connectToPeer(fid))}
function discoverOnlinePeers(){if(!myPeer||!myPeer.open)return;try{myPeer.listAllPeers(peers=>{const prefix='friendapp-user-';peers.forEach(pid=>{if(!pid.startsWith(prefix))return;const uid=parseInt(pid.replace(prefix,''));if(isNaN(uid)||uid===user.id||connections[uid])return;const db=loadDB();if(!db.users.find(u=>u.id===uid)){const tmpConn=myPeer.connect(pid,{reliable:true});tmpConn.on('open',()=>{connections[uid]=tmpConn;onlinePeers.add(uid);tmpConn.send({type:'user-info-request',fromUserId:user.id,fromUsername:user.username,fromNickname:user.nickname});setTimeout(()=>{if(tmpConn.open&&!db.friendships.some(f=>(f.user_id===user.id&&f.friend_id===uid)||(f.user_id===uid&&f.friend_id===user.id))){tmpConn.close();delete connections[uid];onlinePeers.delete(uid)}},8000)});handleDataConnection(tmpConn);tmpConn.on('error',()=>{delete connections[uid];onlinePeers.delete(uid)})}})})}catch(e){console.log('discoverOnlinePeers error',e)}}
function connectToPeer(fid){if(connections[fid]&&connections[fid].open)return;if(connections[fid]&&!connections[fid].open){delete connections[fid];onlinePeers.delete(fid)}try{const conn=myPeer.connect('friendapp-user-'+fid,{reliable:true});conn.on('open',()=>{connections[fid]=conn;onlinePeers.add(fid);conn.send({type:'online',userId:user.id,nickname:user.nickname});updateStatus();deliverPendingMessages(fid);if(curChat&&curChatType==='friend'&&curChat.id===fid)document.getElementById('chatStatus').textContent='🟢 在线'});conn.on('close',()=>{delete connections[fid];onlinePeers.delete(fid);updateStatus();if(curChat&&curChatType==='friend'&&curChat.id===fid)document.getElementById('chatStatus').textContent='⚫ 离线'});conn.on('error',()=>{delete connections[fid];onlinePeers.delete(fid)});handleDataConnection(conn)}catch(e){}}
const PENDING_KEY='friendAppPending';
function getPending(){try{return JSON.parse(localStorage.getItem(PENDING_KEY))||{}}catch{return{}}}
function savePending(p){localStorage.setItem(PENDING_KEY,JSON.stringify(p))}
function queueMessage(msg){const p=getPending();const k=String(msg.receiver_id);if(!p[k])p[k]=[];p[k].push(msg);savePending(p)}
function deliverPendingMessages(fid){const p=getPending();const k=String(fid);const ms=p[k]||[];if(!ms.length)return;const c=connections[fid];if(!c||!c.open)return;c.send({type:'messages-batch',messages:ms});ms.forEach(m=>setTimeout(()=>{if(c.open)c.send({type:'msg-ack',msgId:m.id})},200));delete p[k];savePending(p)}
function deliverAllPending(){const p=getPending();Object.keys(p).forEach(fid=>{if(onlinePeers.has(parseInt(fid)))deliverPendingMessages(parseInt(fid))})}
function updateStatus(){if(curChat&&curChatType==='friend')document.getElementById('chatStatus').textContent=onlinePeers.has(curChat.id)?'🟢 在线':'⚫ 离线';document.querySelectorAll('[data-fid]').forEach(el=>{const s=el.querySelector('.friend-status');if(s)s.textContent=onlinePeers.has(parseInt(el.dataset.fid))?'🟢':'⚫'})}
function sendReadReceipt(fid){const c=connections[fid];if(c&&c.open)c.send({type:'msg-read',fromId:fid})}

function doRegister(){const u=document.getElementById('regUser').value.trim(),n=document.getElementById('regNick').value.trim(),p=document.getElementById('regPass').value;if(!u||!p){err(document.getElementById('regError'),'请输入用户名和密码');return}if(u.length<2){err(document.getElementById('regError'),'用户名至少2个字符');return}if(p.length<4){err(document.getElementById('regError'),'密码至少4个字符');return}const db=loadDB();if(db.users.find(x=>x.username===u)){err(document.getElementById('regError'),'用户名已存在');return}const nu={id:db.nextId++,username:u,password:p,nickname:n||u,avatar:'',remark:{}};db.users.push(nu);saveDB(db);user={id:nu.id,username:nu.username,nickname:nu.nickname,avatar:''};localStorage.setItem('friendAppUser',JSON.stringify(user));pushToRegistry({id:nu.id,username:nu.username,nickname:nu.nickname}).then(ok=>{if(!ok)showToast('⚠️ 注册成功但同步到服务器失败，稍后重试')});enterApp()}

// ===== Chat List =====
function renderChats(){
  const db=loadDB();const chatMap={};
  db.messages.filter(m=>!m.recalled).forEach(m=>{
    let ck,oid,cn;
    if(m.group_id){ck='group-'+m.group_id;const g=db.groups.find(x=>x.id===m.group_id);if(!g)return;cn=g.name;oid=m.group_id}
    else{if(m.sender_id===user.id)oid=m.receiver_id;else if(m.receiver_id===user.id)oid=m.sender_id;else return;ck='friend-'+oid;const u=db.users.find(x=>x.id===oid);cn=u?getDisplayName(u):'未知'}
    if(!chatMap[ck]||new Date(m.created_at)>new Date(chatMap[ck].time))chatMap[ck]={key:ck,otherId:oid,chatName:cn,lastMsg:m,time:m.created_at,unread:0,type:m.group_id?'group':'friend'}
  });
  db.messages.filter(m=>!m.recalled&&m.receiver_id===user.id&&!m.group_id&&!m.read).forEach(m=>{const k='friend-'+m.sender_id;if(chatMap[k])chatMap[k].unread++});
  db.messages.filter(m=>!m.recalled&&m.group_id&&!m.read&&m.sender_id!==user.id).forEach(m=>{const k='group-'+m.group_id;if(chatMap[k])chatMap[k].unread++});
  let chats=Object.values(chatMap).sort((a,b)=>new Date(b.time)-new Date(a.time));
  chats.sort((a,b)=>(pinnedChats.includes(b.key)?1:0)-(pinnedChats.includes(a.key)?1:0));
  let html='';
  if(!chats.length)html='<div class="empty"><div class="icon">💬</div><p>暂无聊天</p></div>';
  else chats.forEach(c=>{
    const t=new Date(c.time);const today=new Date();let ts=t.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});if(t.toDateString()!==today.toDateString())ts=t.toLocaleDateString('zh-CN',{month:'numeric',day:'numeric'});
    let lt=c.lastMsg.type==='voice'?'🎤 语音消息':c.lastMsg.type==='image'?'📷 图片':c.lastMsg.type==='location'?'📍 位置':c.lastMsg.type==='nudge'?'👋 拍一拍':c.lastMsg.type==='redpacket'?'🧧 红包':c.lastMsg.type==='video'?'📹 视频':c.lastMsg.type==='file'?'📎 文件':c.lastMsg.type==='card'?'👤 名片':c.lastMsg.type==='recall'?'↩️ 已撤回':c.lastMsg.content||'';
    const pin=pinnedChats.includes(c.key);const mut=mutedChats.includes(c.key);const ac=c.type==='group'?'av-group':avClass(c.otherId);
    html+=`<div class="friend-item ${pin?'pinned':''} ${mut?'muted':''}" onclick="openChat('${c.key}')"><div class="avatar ${ac}">${c.chatName[0]}</div><div style="flex:1;position:relative"><div class="friend-name">${esc(c.chatName)}${c.unread?'<span class="badge">'+c.unread+'</span>':''}${mut?' 🔇':''}</div><div class="last-msg">${esc(lt)}</div><span class="msg-time-small">${ts}</span></div></div>`;
  });
  document.getElementById('tabContent').innerHTML=html;updateBadge();
}

// ===== Contacts =====
function renderContacts(){
  const db=loadDB();const fids=db.friendships.filter(f=>(f.user_id===user.id||f.friend_id===user.id)&&f.status==='accepted').map(f=>f.user_id===user.id?f.friend_id:f.user_id);
  const friends=db.users.filter(u=>fids.includes(u.id));const pendingRecv=db.friendships.filter(f=>f.friend_id===user.id&&f.status==='pending');const pendingSent=db.friendships.filter(f=>f.user_id===user.id&&f.status==='pending');const groups=db.groups.filter(g=>g.members.includes(user.id));
  let html='';
  if(pendingRecv.length){html+='<div style="padding:10px 16px;background:#fffbeb;border-bottom:1px solid #fef3c7"><p style="font-weight:600;color:#92400e;font-size:14px">📬 好友请求 ('+pendingRecv.length+')</p></div>';pendingRecv.forEach(p=>{const from=db.users.find(u=>u.id===p.user_id);html+=`<div class="friend-item"><div class="avatar ${avClass(p.user_id)}">${(from?.nickname||'?')[0]}</div><div style="flex:1"><div class="friend-name">${from?esc(from.nickname||from.username):'未知'}</div><div style="font-size:12px;color:#999">请求添加你为好友</div></div><button class="add-btn" onclick="respondReq(${p.id},'accept')" style="margin-right:6px">接受</button><button style="background:#f5f5f5;color:#666;border:none;padding:5px 14px;border-radius:6px;font-size:13px;cursor:pointer" onclick="respondReq(${p.id},'reject')">拒绝</button></div>`})}
  if(pendingSent.length){html+='<div style="padding:10px 16px;background:#f0f9ff;border-bottom:1px solid #e0f2fe"><p style="font-weight:600;color:#0369a1;font-size:14px">📤 待验证 ('+pendingSent.length+')</p></div>';pendingSent.forEach(p=>{const to=db.users.find(u=>u.id===p.friend_id);html+=`<div class="friend-item"><div class="avatar ${avClass(p.friend_id)}">${(to?.nickname||'?')[0]}</div><div style="flex:1"><div class="friend-name">${to?esc(to.nickname||to.username):'未知'}</div><div style="font-size:12px;color:#f09b37">等待对方验证</div></div></div>`})}
  if(groups.length){html+='<div style="padding:8px 16px;color:#999;font-size:12px">群聊</div>';groups.forEach(g=>{html+=`<div class="friend-item" onclick="openChat('group-${g.id}')"><div class="avatar av-group">👥</div><div style="flex:1"><div class="friend-name">${esc(g.name)}</div><div style="font-size:12px;color:#999">${g.members.length}人</div></div></div>`})}
  html+='<div style="padding:8px 16px;color:#999;font-size:12px">好友 ('+friends.length+')</div>';
  if(!friends.length&&!groups.length&&!pendingRecv.length&&!pendingSent.length)html+='<div class="empty"><div class="icon">👥</div><p>还没有好友</p></div>';
  else friends.forEach(f=>{const name=getDisplayName(f);html+=`<div class="friend-item" data-fid="${f.id}" onclick="showProfile(${f.id})"><div class="avatar ${avClass(f.id)}">${name[0]}</div><div style="flex:1"><div class="friend-name">${esc(name)}</div><div style="font-size:12px;color:#999">${onlinePeers.has(f.id)?'🟢':'⚫'}</div></div></div>`});
  document.getElementById('tabContent').innerHTML=html;
}
function respondReq(id,action){const db=loadDB();const f=db.friendships.find(x=>x.id===id);if(!f)return;const otherId=f.user_id===user.id?f.friend_id:f.user_id;if(action==='accept'){f.status='accepted';saveDB(db);connectToPeer(otherId);const c=connections[otherId];if(c&&c.open)c.send({type:'friend-accept',fromUserId:user.id,fromUsername:user.username,fromNickname:user.nickname});removeFriendRequest(otherId,user.id);showToast('已接受好友请求')}else{db.friendships=db.friendships.filter(x=>x.id!==id);saveDB(db);removeFriendRequest(otherId,user.id);showToast('已拒绝')}renderContacts();broadcastOnline()}

function renderAddFriend(){searchResultCache={};document.getElementById('tabContent').innerHTML=`<div style="padding:12px 16px;background:#ededed;border-bottom:1px solid #e0e0e0;display:flex;align-items:center;gap:8px"><button style="background:none;border:none;font-size:20px;cursor:pointer;color:#1e293b" onclick="renderDiscover()">‹</button><input type="text" id="searchInput" placeholder="搜索用户名或昵称..." oninput="searchUsers()" style="flex:1;padding:8px 14px;border:none;border-radius:6px;font-size:14px"></div><div style="padding:12px 16px;background:#fff;border-bottom:1px solid #eee;display:flex;gap:8px;align-items:center"><input type="text" id="exactUsername" placeholder="输入对方用户名精确添加..." style="flex:1;padding:8px 14px;border:1px solid #e0e0e0;border-radius:6px;font-size:14px"><button style="background:#07c160;color:#fff;border:none;padding:8px 16px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer" onclick="addFriendByUsername()">添加</button></div><div id="searchResults"><div class="empty" style="padding:30px"><p>⏳ 正在同步用户列表...</p></div></div>`;syncRegistryToLocal().then(()=>{document.getElementById('searchResults').innerHTML='<div class="empty" style="padding:30px"><p>输入用户名或昵称搜索</p><p style="font-size:12px;color:#bbb;margin-top:8px">💡 也可以在上方输入对方用户名精确添加</p></div>'})}
function searchUsers(){const q=document.getElementById('searchInput').value.trim().toLowerCase();currentSearchQuery=q;if(!q){document.getElementById('searchResults').innerHTML='<div class="empty" style="padding:30px"><p>输入用户名或昵称搜索</p></div>';return}document.getElementById('searchResults').innerHTML='<div class="empty" style="padding:30px"><p>⏳ 搜索中...</p></div>';let localDone=false,remoteDone=false;function tryDisplay(){if(!localDone||!remoteDone)return;refreshSearchDisplay()}syncRegistryToLocal().then(()=>{localDone=true;tryDisplay()});fetchRegistry().then(reg=>{if(!reg||!reg.length){remoteDone=true;tryDisplay();return}const db=loadDB();let changed=false;reg.forEach(ru=>{const existById=db.users.find(u=>u.id===ru.id);const existByName=db.users.find(u=>u.username===ru.username);if(!existById&&!existByName){db.users.push({id:ru.id,username:ru.username,nickname:ru.nickname,password:'',avatar:'',remark:{}});changed=true}else if(existByName&&!existById){existByName.id=ru.id;changed=true}});if(changed){if(Math.max(...reg.map(r=>r.id),0)>=db.nextId)db.nextId=Math.max(...reg.map(r=>r.id),0)+1;saveDB(db)}remoteDone=true;tryDisplay()}).catch(()=>{remoteDone=true;tryDisplay()});Object.keys(connections).forEach(fid=>{const c=connections[fid];if(c&&c.open)c.send({type:'search-request',query:q,fromUserId:user.id,requestId:Date.now().toString()})})}
function handleSearchRequest(conn,data){const q=data.query.toLowerCase();const db=loadDB();const r=db.users.filter(u=>u.id!==data.fromUserId&&(u.username.toLowerCase().includes(q)||(u.nickname||'').toLowerCase().includes(q))).map(u=>({id:u.id,username:u.username,nickname:u.nickname}));if(r.length&&conn.open)conn.send({type:'search-response',results:r,query:q,requestId:data.requestId})}
function handleSearchResponse(data){if(!data.results||!data.results.length)return;const db=loadDB();data.results.forEach(u=>{if(!db.users.find(x=>x.id===u.id))db.users.push({id:u.id,username:u.username,nickname:u.nickname,password:'',avatar:'',remark:{}})});db.nextId=Math.max(db.nextId,...data.results.map(u=>u.id+1));saveDB(db);searchResultCache[data.requestId]=data.results;refreshSearchDisplay()}
function refreshSearchDisplay(){if(!currentSearchQuery)return;const db=loadDB();const q=currentSearchQuery;const lr=db.users.filter(u=>u.username!==user.username&&(u.username.toLowerCase().includes(q)||(u.nickname||'').toLowerCase().includes(q)));const rr=[];Object.values(searchResultCache).forEach(a=>{a.forEach(u=>{if(!rr.find(r=>r.id===u.id))rr.push(u)})});displaySearchResults(lr,rr)}
function displaySearchResults(lr,rr){const db=loadDB();const allFriendships=db.friendships.filter(f=>f.user_id===user.id||f.friend_id===user.id);let html='';const seen=new Set();const all=[...lr,...rr.filter(u=>!lr.find(l=>l.username===u.username))];all.forEach(u=>{if(u.username===user.username||seen.has(u.username))return;seen.add(u.username);const fs=allFriendships.find(f=>(f.user_id===user.id&&f.friend_id===u.id)||(f.user_id===u.id&&f.friend_id===user.id));let statusHtml;if(fs&&fs.status==='accepted')statusHtml='<span style="color:#07c160;font-size:13px">已添加</span>';else if(fs&&fs.status==='pending'&&fs.user_id===user.id)statusHtml='<span style="color:#f09b37;font-size:13px">待验证</span>';else if(fs&&fs.status==='pending'&&fs.friend_id===user.id)statusHtml=`<button class="add-btn" onclick="respondReq(${fs.id},'accept')" style="background:#07c160">接受</button>`;else statusHtml=`<button class="add-btn" onclick="addFriend(${u.id})">添加</button>`;html+=`<div class="search-result"><div class="avatar ${avClass(u.id)}" style="width:40px;height:40px;font-size:16px;margin-right:12px">${(u.nickname||u.username)[0]}</div><div class="info"><div class="name">${esc(u.nickname||u.username)}</div><div style="font-size:12px;color:#999">@${u.username}</div></div>${statusHtml}</div>`});if(!html)html='<div class="empty" style="padding:30px"><p>没找到用户</p></div>';document.getElementById('searchResults').innerHTML=html}
function addFriend(fid){const db=loadDB();const existing=db.friendships.find(f=>(f.user_id===user.id&&f.friend_id===fid)||(f.user_id===fid&&f.friend_id===user.id));if(existing){if(existing.status==='pending')showToast('已发送请求，等待对方验证');else if(existing.status==='accepted')showToast('已经是好友');return}db.friendships.push({id:db.nextId++,user_id:user.id,friend_id:fid,status:'pending'});saveDB(db);connectToPeer(fid);const c=connections[fid];if(c&&c.open)c.send({type:'friend-request',fromUserId:user.id,fromUsername:user.username,fromNickname:user.nickname});pushFriendRequest({fromUserId:user.id,fromUsername:user.username,fromNickname:user.nickname,toUserId:fid,createdAt:new Date().toISOString()});showToast('已发送好友请求，等待对方验证');const si=document.getElementById('searchInput');if(si)searchUsers()}
function addFriendByUsername(){const el=document.getElementById('exactUsername');if(!el)return;const uname=el.value.trim();if(!uname){showToast('请输入用户名');return}if(uname===user.username){showToast('不能添加自己');return}const db=loadDB();const found=db.users.find(u=>u.username===uname);if(found){addFriend(found.id);el.value='';return}showToast('正在搜索用户...');fetchRegistry().then(reg=>{if(!reg){showToast('搜索失败，请稍后重试');return}const db2=loadDB();let changed=false;reg.forEach(ru=>{const existById=db2.users.find(u=>u.id===ru.id);const existByName=db2.users.find(u=>u.username===ru.username);if(!existById&&!existByName){db2.users.push({id:ru.id,username:ru.username,nickname:ru.nickname,password:'',avatar:'',remark:{}});changed=true}else if(existByName&&existByName.id!==ru.id){existByName.id=ru.id;changed=true}});if(changed){if(Math.max(...reg.map(r=>r.id),0)>=db2.nextId)db2.nextId=Math.max(...reg.map(r=>r.id),0)+1;saveDB(db2)}const match=db2.users.find(u=>u.username===uname);if(match){addFriend(match.id);el.value='';return}tryAddFriendViaPeer(uname)})}
function tryAddFriendViaPeer(uname){if(!myPeer||!myPeer.open){showToast('网络未连接，无法搜索');return}myPeer.listAllPeers(peers=>{const prefix='friendapp-user-';let found=false;let tried=0;const total=peers.filter(p=>p.startsWith(prefix)&&parseInt(p.replace(prefix,''))!==user.id).length;if(!total){showToast('未找到用户 "'+uname+'"，请确认对方在线且用户名正确');return}peers.forEach(pid=>{if(!pid.startsWith(prefix))return;const uid=parseInt(pid.replace(prefix,''));if(isNaN(uid)||uid===user.id)return;if(connections[uid]){const u=db.users.find(x=>x.id===uid);if(u&&u.username===uname){addFriend(uid);found=true}if(connections[uid].open)connections[uid].send({type:'search-request',query:uname,fromUserId:user.id,requestId:'exact-'+Date.now()});return}tried++;const tmpConn=myPeer.connect(pid,{reliable:true});tmpConn.on('open',()=>{connections[uid]=tmpConn;onlinePeers.add(uid);tmpConn.send({type:'user-info-request',fromUserId:user.id,fromUsername:user.username,fromNickname:user.nickname});tmpConn.send({type:'search-request',query:uname,fromUserId:user.id,requestId:'exact-'+Date.now()});setTimeout(()=>{if(tmpConn.open){const db2=loadDB();const match=db2.users.find(u=>u.username===uname);if(match){if(!found){addFriend(match.id);found=true;document.getElementById('exactUsername')&&(document.getElementById('exactUsername').value='')}}if(!db2.friendships.some(f=>(f.user_id===user.id&&f.friend_id===uid)||(f.user_id===uid&&f.friend_id===user.id))){tmpConn.close();delete connections[uid];onlinePeers.delete(uid)}}},3000)});handleDataConnection(tmpConn);tmpConn.on('error',()=>{delete connections[uid];onlinePeers.delete(uid)})});setTimeout(()=>{if(!found){const db2=loadDB();const match=db2.users.find(u=>u.username===uname);if(match){addFriend(match.id)}else{showToast('未找到用户 "'+uname+'"，请确认对方用户名')}}},5000)})}

function createGroup(){const db=loadDB();const fids=db.friendships.filter(f=>(f.user_id===user.id||f.friend_id===user.id)&&f.status==='accepted').map(f=>f.user_id===user.id?f.friend_id:f.user_id);const friends=db.users.filter(u=>fids.includes(u.id));if(!friends.length){showToast('至少需要1个好友');return}const name=prompt('群聊名称：','群聊');if(!name)return;const members=[user.id,...friends.map(f=>f.id)];const grp={id:db.nextId++,name,members,owner:user.id,created_at:new Date().toISOString()};db.groups.push(grp);saveDB(db);members.forEach(mid=>{if(mid!==user.id)connectToPeer(mid)});showToast('群聊创建成功');renderDiscover()}

function renderMe(){const db=loadDB();const me=db.users.find(u=>u.id===user.id);document.getElementById('tabContent').innerHTML=`<div style="background:#fff"><div class="profile-header" onclick="editMyNickname()"><div class="profile-avatar ${avClass(user.id)}">${(me.nickname||me.username)[0]}</div><div class="profile-info"><div class="profile-name">${esc(me.nickname||me.username)}</div><div class="profile-id">微信号：${me.username}</div></div></div></div><div style="background:#fff;margin-top:8px"><div class="settings-row" onclick="editMyNickname()"><span class="label">修改昵称</span><span class="value">›</span></div><div class="settings-row" onclick="changePasswordUI()"><span class="label">修改密码</span><span class="value">›</span></div><div class="settings-row" onclick="showMyQR()"><span class="label">我的二维码</span><span class="value">›</span></div><div class="settings-row"><span class="label">收藏</span><span class="value">${favorites.length}条 ›</span></div></div><div style="background:#fff;margin-top:8px"><div class="settings-row" onclick="window.open('./download.html','_blank')"><span class="label">📲 下载安装App</span><span class="value">›</span></div><div class="settings-row" onclick="shareApp()"><span class="label">🔗 分享给朋友</span><span class="value">›</span></div></div><div id="pwdSection" style="display:none;background:#fff;margin-top:8px;padding:16px"><h3 style="font-size:15px;margin-bottom:12px">🔑 修改密码</h3><div id="pwdError" class="error"></div><div id="pwdSuccess" class="success"></div><input type="password" class="settings-input" id="oldPwd" placeholder="当前密码"><input type="password" class="settings-input" id="newPwd" placeholder="新密码"><input type="password" class="settings-input" id="confirmPwd" placeholder="确认新密码"><button class="btn btn-green" onclick="changePassword()">确认修改</button></div>`}
function changePasswordUI(){const s=document.getElementById('pwdSection');s.style.display=s.style.display==='none'?'block':'none'}
function changePassword(){const o=document.getElementById('oldPwd').value,n=document.getElementById('newPwd').value,c=document.getElementById('confirmPwd').value;const eE=document.getElementById('pwdError'),oE=document.getElementById('pwdSuccess');eE.style.display='none';oE.style.display='none';if(!o||!n||!c){err(eE,'请填写所有字段');return}const db=loadDB();const u=db.users.find(x=>x.id===user.id);if(!u||u.password!==o){err(eE,'当前密码错误');return}if(n.length<4){err(eE,'新密码至少4位');return}if(n!==c){err(eE,'两次输入不一致');return}u.password=n;saveDB(db);ok(oE,'密码修改成功');document.getElementById('oldPwd').value='';document.getElementById('newPwd').value='';document.getElementById('confirmPwd').value=''}
function editMyNickname(){const db=loadDB();const me=db.users.find(u=>u.id===user.id);const nn=prompt('修改昵称：',me.nickname||me.username);if(nn&&nn.trim()){me.nickname=nn.trim();saveDB(db);user.nickname=me.nickname;localStorage.setItem('friendAppUser',JSON.stringify(user));Object.keys(connections).forEach(fid=>{const c=connections[fid];if(c&&c.open)c.send({type:'nickname-update',userId:user.id,nickname:me.nickname})});renderMe()}}
function showMyQR(){const text='FriendApp://add/'+user.id;const size=200;const canvas=document.createElement('canvas');canvas.width=size;canvas.height=size;const ctx=canvas.getContext('2d');const cells=25;const cellSize=size/cells;let hash=0;for(let i=0;i<text.length;i++)hash=((hash<<5)-hash)+text.charCodeAt(i);ctx.fillStyle='#fff';ctx.fillRect(0,0,size,size);ctx.fillStyle='#1e293b';for(let y=0;y<cells;y++)for(let x=0;x<cells;x++){const v=Math.sin(hash*x*7+y*13)*Math.cos(hash*y*11+x*3);if(v>0){ctx.fillRect(x*cellSize,y*cellSize,cellSize,cellSize)}}ctx.fillStyle='#07c160';ctx.fillRect(3*cellSize,3*cellSize,5*cellSize,5*cellSize);ctx.fillStyle='#fff';ctx.font='bold 28px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('F',size/2,size/2);const url=canvas.toDataURL();const w=window.open('','_blank');if(w){w.document.write(`<html><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>我的二维码</title><style>body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#f5f5f5;font-family:sans-serif}img{border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.1)}h2{margin:16px 0 4px;color:#1e293b}p{color:#999;font-size:14px}</style></head><body><img src="${url}" width="200"><h2>${esc(user.nickname||user.username)}</h2><p>微信号：${user.username}</p></body></html>`)}else{prompt('你的二维码信息：',text)}}

function shareApp(){const url='https://52xie.github.io/friend-app/';if(navigator.share){navigator.share({title:'Friend App - 好友互动',text:'来下载 Friend App，一起聊天吧！',url:url}).catch(()=>{})}else{const inp=document.createElement('input');inp.value=url;document.body.appendChild(inp);inp.select();document.execCommand('copy');document.body.removeChild(inp);showToast('链接已复制到剪贴板')}}

// ===== Profile =====
function showProfile(fid){
  const db=loadDB();const f=db.users.find(u=>u.id===fid);if(!f)return;const name=getDisplayName(f);
  const fs=db.friendships.find(fr=>(fr.user_id===user.id&&fr.friend_id===fid)||(fr.user_id===fid&&fr.friend_id===user.id));
  const isFriend=fs&&fs.status==='accepted';
  const isPendingSent=fs&&fs.status==='pending'&&fs.user_id===user.id;
  const isPendingRecv=fs&&fs.status==='pending'&&fs.friend_id===user.id;
  const me=db.users.find(u=>u.id===user.id);const remark=me&&me.remark&&me.remark[fid]||'';
  let actionHtml='';
  if(isFriend)actionHtml=`<button style="background:#07c160;color:#fff" onclick="openChatAndClose('friend-${fid}')">发消息</button><button style="background:#576b95;color:#fff" onclick="startVoiceCallFromProfile(${fid})">📞</button><button style="background:#576b95;color:#fff" onclick="startVideoCallFromProfile(${fid})">📹</button>`;
  else if(isPendingSent)actionHtml=`<button style="background:#f09b37;color:#fff" disabled>待验证</button>`;
  else if(isPendingRecv)actionHtml=`<button style="background:#07c160;color:#fff" onclick="respondReq(${fs.id},'accept')">接受请求</button><button style="background:#ef4444;color:#fff" onclick="respondReq(${fs.id},'reject')">拒绝</button>`;
  else actionHtml=`<button style="background:#07c160;color:#fff" onclick="addFriend(${fid})">添加好友</button>`;
  document.getElementById('profileTitle').textContent='详细资料';
  document.getElementById('profileContent').innerHTML=`<div class="profile-header"><div class="profile-avatar ${avClass(f.id)}">${(f.nickname||f.username)[0]}</div><div class="profile-info"><div class="profile-name">${esc(name)}</div><div class="profile-id">微信号：${f.username}</div>${remark?'<div class="profile-id">备注：'+esc(remark)+'</div>':''}</div></div><div class="profile-actions">${actionHtml}</div>${isFriend?`<div style="background:#fff;margin-top:8px"><div class="settings-row" onclick="setRemark(${fid})"><span class="label">设置备注</span><span class="value">${remark?esc(remark):'未设置'} ›</span></div><div class="settings-row" onclick="sendCard(${fid})"><span class="label">发送名片</span><span class="value">›</span></div><div class="settings-row" onclick="togglePin('friend-${fid}')"><span class="label">置顶聊天</span><span class="value">${pinnedChats.includes('friend-'+fid)?'已置顶':'未置顶'} ›</span></div><div class="settings-row" onclick="toggleMute('friend-${fid}')"><span class="label">消息免打扰</span><span class="value">${mutedChats.includes('friend-'+fid)?'已开启':'未开启'} ›</span></div><div class="settings-row" style="color:#f44336" onclick="deleteFriend(${fid})"><span class="label" style="color:#f44336">删除好友</span><span class="value">›</span></div></div>`:''}`;
  show('profileScreen');
}
function closeProfile(){show('mainScreen');switchTab('contacts',document.querySelectorAll('.tab')[1])}
function openChatAndClose(ck){document.getElementById('profileScreen').classList.remove('active');openChat(ck)}
function setRemark(fid){const db=loadDB();const me=db.users.find(u=>u.id===user.id);const cur=me.remark&&me.remark[fid]||'';const r=prompt('设置备注名：',cur);if(r===null)return;if(!me.remark)me.remark={};me.remark[fid]=r.trim();saveDB(db);showProfile(fid)}
function deleteFriend(fid){if(!confirm('确定删除好友？'))return;const db=loadDB();db.friendships=db.friendships.filter(f=>!((f.user_id===user.id&&f.friend_id===fid)||(f.user_id===fid&&f.friend_id===user.id)));saveDB(db);if(connections[fid]){connections[fid].close();delete connections[fid]}closeProfile();renderContacts()}
function togglePin(ck){const i=pinnedChats.indexOf(ck);if(i>=0)pinnedChats.splice(i,1);else pinnedChats.push(ck);savePinned();showToast(pinnedChats.includes(ck)?'已置顶':'已取消置顶')}
function toggleMute(ck){const i=mutedChats.indexOf(ck);if(i>=0)mutedChats.splice(i,1);else mutedChats.push(ck);saveMuted();showToast(mutedChats.includes(ck)?'已开启免打扰':'已关闭免打扰')}
function sendCard(fid){const db=loadDB();const f=db.users.find(u=>u.id===fid);if(!f)return;closeProfile();const ck=Object.keys(connections).find(k=>connections[k]&&connections[k].open);if(!ck){showToast('没有可发送的聊天');return}openChat('friend-'+ck);setTimeout(()=>{const msg={id:Date.now(),sender_id:user.id,receiver_id:parseInt(ck),type:'card',content:'名片',cardData:{userId:f.id,username:f.username,nickname:f.nickname||f.username},created_at:new Date().toISOString(),read:false,delivered:false};db.messages.push(msg);saveDB(db);const c=connections[parseInt(ck)];if(c&&c.open){c.send({type:'message',msg});msg.delivered=true;saveDB(db)}document.getElementById('msgList').innerHTML+=msgHTML(msg);scrollMsgs()},300)}

// ===== Chat =====
function openChat(ck){
  const db=loadDB();multiSelectMode=false;selectedMsgs=[];
  document.getElementById('multiSelectBar').classList.remove('active');
  document.getElementById('chatInputBar').style.display='flex';
  if(ck.startsWith('friend-')){
    curChatType='friend';const fid=parseInt(ck.replace('friend-',''));curChat=db.users.find(u=>u.id===fid);if(!curChat)return;
    document.getElementById('chatName').textContent=getDisplayName(curChat);document.getElementById('chatStatus').textContent=onlinePeers.has(fid)?'🟢 在线':'⚫ 离线';
    document.getElementById('chatVoiceCallBtn').style.display='flex';
    document.getElementById('chatVideoCallBtn').style.display='flex';
    db.messages.filter(m=>m.sender_id===fid&&m.receiver_id===user.id&&!m.read).forEach(m=>m.read=true);saveDB(db);sendReadReceipt(fid);
    if(!connections[fid]||!connections[fid].open)connectToPeer(fid);
  }else{
    curChatType='group';const gid=parseInt(ck.replace('group-',''));curChat=db.groups.find(g=>g.id===gid);if(!curChat)return;
    document.getElementById('chatName').textContent=curChat.name;document.getElementById('chatStatus').textContent=curChat.members.length+'人';
    document.getElementById('chatVoiceCallBtn').style.display='none';
    document.getElementById('chatVideoCallBtn').style.display='none';
    db.messages.filter(m=>m.group_id===gid&&!m.read&&m.sender_id!==user.id).forEach(m=>m.read=true);saveDB(db);
  }
  show('chatScreen');loadMessages();
}
function loadMessages(){
  const db=loadDB();let msgs;
  if(curChatType==='friend')msgs=db.messages.filter(m=>!m.group_id&&((m.sender_id===user.id&&m.receiver_id===curChat.id)||(m.sender_id===curChat.id&&m.receiver_id===user.id)));
  else msgs=db.messages.filter(m=>m.group_id===curChat.id);
  msgs.sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
  document.getElementById('msgList').innerHTML=msgs.map(m=>msgHTML(m)).join('');scrollMsgs();
}
function msgHTML(m){
  const isMe=m.sender_id===user.id;const t=new Date(m.created_at).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  const delivered=isMe?(m.delivered?(m.readByReceiver?'已读':'已送'):'已发'):'';
  const db=loadDB();const sender=db.users.find(u=>u.id===m.sender_id);const sName=sender?getDisplayName(sender):'';
  const avCls=avClass(m.sender_id);const avText=sName?sName[0]:'?';
  const rowCls=isMe?'msg-row msg-row-me':'msg-row';

  if(m.recalled)return`<div class="${rowCls}" id="msg-${m.id}" oncontextmenu="showMsgMenu(event,${m.id})"><div class="msg-avatar ${avCls}">${avText}</div><div class="msg-bubble"><div class="msg-recalled">${isMe?'你':'对方'}撤回了一条消息</div></div></div>`;
  if(m.type==='nudge')return`<div class="${rowCls}" id="msg-${m.id}"><div class="msg-avatar ${avCls}">${avText}</div><div class="msg-bubble"><div class="msg-nudge">👋 ${sName} 拍了拍你</div></div></div>`;

  let senderLabel='';if(curChatType==='group'&&!isMe)senderLabel=`<div class="msg-sender">${esc(sName)}</div>`;
  let quoteHTML='';if(m.quoteId){const qm=db.messages.find(x=>x.id===m.quoteId);if(qm&&!qm.recalled){const qu=db.users.find(x=>x.id===qm.sender_id);const qt=qm.type==='voice'?'🎤':qm.type==='image'?'📷':qm.content||'';quoteHTML=`<div class="msg-quote" onclick="scrollMsgTo(${qm.id})">${qu?esc(qu.nickname||qu.username):''}: ${esc(qt)}</div>`}}

  // 已读状态
  const readInfo=isMe?`<div class="msg-read-status">${delivered}</div>`:'';

  if(m.type==='redpacket'&&m.rpData){
    const opened=m.rpData.claimed&&m.rpData.claimed.some(c=>c.userId===user.id);
    const cls=opened?'msg-redpacket-opened':'msg-redpacket';
    return`<div class="${rowCls}" id="msg-${m.id}" oncontextmenu="showMsgMenu(event,${m.id})" ${!opened?`onclick="openRedPacket(${m.id})"`:''}><div class="msg-avatar av-redpacket">🧧</div><div class="msg-bubble"><div class="${cls}"><div class="rp-greeting">${esc(m.rpData.greeting||'恭喜发财')}</div>${opened?'<div style="font-size:12px;opacity:.7">已领取</div>':`<div class="rp-amount">${m.rpData.amount}元</div>`}</div><div class="msg-time">${t} ${readInfo}</div></div></div>`;
  }
  if(m.type==='card'&&m.cardData){return`<div class="${rowCls}" id="msg-${m.id}" oncontextmenu="showMsgMenu(event,${m.id})"><div class="msg-avatar ${avClass(m.cardData.userId)}">${(m.cardData.nickname||'?')[0]}</div><div class="msg-bubble">${senderLabel}<div class="msg-card" onclick="showProfile(${m.cardData.userId})"><div class="card-avatar ${avClass(m.cardData.userId)}" style="color:#fff;display:flex;align-items:center;justify-content:center;border-radius:4px">${(m.cardData.nickname||'?')[0]}</div><div class="card-name">${esc(m.cardData.nickname)}</div><div class="card-username">@${m.cardData.username}</div><div class="card-label">个人名片</div></div><div class="msg-time">${t} ${readInfo}</div></div></div>`}
  if(m.type==='location'&&m.locationData){return`<div class="${rowCls}" id="msg-${m.id}" oncontextmenu="showMsgMenu(event,${m.id})" onclick="openMap(${m.id})"><div class="msg-avatar ${avCls}">${avText}</div><div class="msg-bubble">${senderLabel}${quoteHTML}<div class="msg-location"><div class="loc-name">${esc(m.locationData.name||'位置')}</div><div class="loc-addr">${esc(m.locationData.address||'')}</div><div class="loc-map">📍</div></div><div class="msg-time">${t} ${readInfo}</div></div></div>`}
  if(m.type==='image'&&m.imageData){return`<div class="${rowCls}" id="msg-${m.id}" oncontextmenu="showMsgMenu(event,${m.id})"><div class="msg-avatar ${avCls}">${avText}</div><div class="msg-bubble">${senderLabel}${quoteHTML}<img class="msg-img" src="${m.imageData}" onclick="previewImg('${m.id}')" alt="图片"><div class="msg-time">${t} ${readInfo}</div></div></div>`}
  if(m.type==='voice'&&m.voiceData){const dur=m.duration||0,sec=Math.floor(dur/1000),mm=Math.floor(sec/60),ss=sec%60;const ds=mm>0?mm+':'+String(ss).padStart(2,'0'):ss+'"';const bars=Array.from({length:Math.max(6,Math.min(14,sec*2))},(_,i)=>`<span style="animation-delay:${i*0.1}s;height:${4+Math.random()*10}px"></span>`).join('');return`<div class="${rowCls}" id="msg-${m.id}" oncontextmenu="showMsgMenu(event,${m.id})" onclick="playVoice('${m.id}')" style="cursor:pointer"><div class="msg-avatar ${avCls}">${avText}</div><div class="msg-bubble">${senderLabel}${quoteHTML}<div class="voice-msg ${isMe?'voice-msg-me':'voice-msg-them'}"><button class="play-btn" id="play-${m.id}">▶</button><div class="voice-wave">${bars}</div><span class="voice-dur">${ds}</span></div><div class="msg-time">${t} ${readInfo}</div></div></div>`}
  // 文本
  let content=esc(m.content||'');content=content.replace(/@(\S+)/g,'<span class="msg-at">@$1</span>');
  return`<div class="${rowCls}" id="msg-${m.id}" oncontextmenu="showMsgMenu(event,${m.id})"><div class="msg-avatar ${avCls}">${avText}</div><div class="msg-bubble"><div class="msg ${isMe?'msg-me':'msg-them'}">${senderLabel}${quoteHTML}${content}</div><div class="msg-time">${t} ${readInfo}</div></div></div>`;
}
function scrollMsgs(){const el=document.getElementById('msgList');el.scrollTop=el.scrollHeight}
function scrollMsgTo(id){const el=document.getElementById('msg-'+id);if(el)el.scrollIntoView({behavior:'smooth',block:'center'})}

// ===== Input =====
let lastTypingTime=0;
function onMsgInput(){const inp=document.getElementById('msgInput');document.getElementById('sendBtn').className=inp.value.trim()?'send-btn':'send-btn disabled';if(!curChat||curChatType!=='friend')return;const now=Date.now();if(now-lastTypingTime<2000)return;lastTypingTime=now;const c=connections[curChat.id];if(c&&c.open)c.send({type:'typing',fromId:user.id});
  // @提及
  const v=inp.value;const atIdx=v.lastIndexOf('@');if(atIdx>=0&&curChatType==='group'){const after=v.substring(atIdx+1);showAtPanel(after)}else{document.getElementById('atPanel').classList.remove('active')}
}

// ===== Send =====
function sendMsg(){
  const inp=document.getElementById('msgInput');const txt=inp.value.trim();if(!txt||!curChat)return;inp.value='';document.getElementById('sendBtn').className='send-btn disabled';document.getElementById('emojiPicker').classList.remove('active');document.getElementById('atPanel').classList.remove('active');
  const quoteId=window._replyTo;window._replyTo=null;document.getElementById('msgInput').placeholder='输入消息...';
  if(curChatType==='friend'){
    const msg={id:Date.now(),sender_id:user.id,receiver_id:curChat.id,content:txt,created_at:new Date().toISOString(),read:false,delivered:false,readByReceiver:false};if(quoteId)msg.quoteId=quoteId;
    const db=loadDB();db.messages.push(msg);saveDB(db);
    if(!connections[curChat.id]||!connections[curChat.id].open)connectToPeer(curChat.id);
    const trySend=()=>{const c=connections[curChat.id];if(c&&c.open){c.send({type:'message',msg});msg.delivered=true;saveDB(db);sendReadReceipt(curChat.id);return true}return false};
    if(!trySend()){queueMessage(msg);let retries=0;const iv=setInterval(()=>{retries++;if(trySend()||retries>10){clearInterval(iv);if(retries<=10)deliverPendingMessages(curChat.id)}},500)}
    document.getElementById('msgList').innerHTML+=msgHTML(msg);scrollMsgs();
  }else{
    const msg={id:Date.now(),sender_id:user.id,group_id:curChat.id,content:txt,created_at:new Date().toISOString(),read:false,delivered:false};if(quoteId)msg.quoteId=quoteId;
    const db=loadDB();db.messages.push(msg);saveDB(db);curChat.members.forEach(mid=>{if(mid!==user.id){const c=connections[mid];if(c&&c.open)c.send({type:'group-msg',msg,groupId:curChat.id})}});
    document.getElementById('msgList').innerHTML+=msgHTML(msg);scrollMsgs();
  }
}
function receiveMessage(data,isBatch){const msg=data.msg;if(!msg)return;const db=loadDB();if(!db.messages.find(m=>m.id===msg.id)){db.messages.push(msg);saveDB(db)}if(!isBatch){const c=connections[msg.sender_id];if(c&&c.open)c.send({type:'msg-ack',msgId:msg.id})}if(curChat&&curChatType==='friend'&&curChat.id===msg.sender_id){if(!document.getElementById('msg-'+msg.id)){document.getElementById('msgList').innerHTML+=msgHTML(msg);scrollMsgs()}msg.read=true;saveDB(db);sendReadReceipt(msg.sender_id)}else if(!mutedChats.includes('friend-'+msg.sender_id)){showToast((db.users.find(u=>u.id===msg.sender_id)?.nickname||'')+': '+(msg.type==='voice'?'🎤语音':msg.type==='image'?'📷图片':msg.content||''))}updateBadge()}
function receiveGroupMsg(data){const msg=data.msg;if(!msg||msg.sender_id===user.id)return;const db=loadDB();if(!db.messages.find(m=>m.id===msg.id)){db.messages.push(msg);saveDB(db)}if(curChat&&curChatType==='group'&&curChat.id===data.groupId){if(!document.getElementById('msg-'+msg.id)){document.getElementById('msgList').innerHTML+=msgHTML(msg);scrollMsgs()}msg.read=true;saveDB(db)}else if(!mutedChats.includes('group-'+data.groupId)){showToast(msg.content||'群消息')}updateBadge()}

let menuMsgId=null;
function showMsgMenu(e,msgId){e.preventDefault();menuMsgId=msgId;const db=loadDB();const msg=db.messages.find(m=>m.id===msgId);if(!msg)return;const isMe=msg.sender_id===user.id;const canRecall=isMe&&(Date.now()-new Date(msg.created_at).getTime()<120000);const items=[{label:'复制',action:'copyMsg'},{label:'回复',action:'replyMsg'},{label:'转发',action:'forwardMsg'},{label:'多选',action:'enterMultiSelect'}];if(canRecall)items.push({label:'撤回',action:'recallMsg'});items.push({label:'收藏',action:'favMsg'});if(isMe)items.push({label:'删除',action:'deleteMsg'});const menu=document.getElementById('msgMenu');menu.innerHTML=items.map(i=>`<div class="msg-menu-item" onclick="${i.action}()">${i.label}</div>`).join('');const rect=e.target.closest('.msg-row,.msg-recalled,.msg-nudge')?.getBoundingClientRect()||e.target.getBoundingClientRect();let top=rect.top-10,left=rect.left;if(top+items.length*34>window.innerHeight)top=rect.bottom-items.length*34;if(left+100>window.innerWidth)left=window.innerWidth-110;menu.style.top=top+'px';menu.style.left=left+'px';menu.classList.add('active');setTimeout(()=>document.addEventListener('click',closeMsgMenu,{once:true}),10)}

function copyMsg(){const db=loadDB();const msg=db.messages.find(m=>m.id===menuMsgId);if(msg&&msg.content){navigator.clipboard?navigator.clipboard.writeText(msg.content):prompt('复制:',msg.content)}closeMsgMenu()}
function replyMsg(){window._replyTo=menuMsgId;const db=loadDB();const msg=db.messages.find(m=>m.id===menuMsgId);if(msg){const u=db.users.find(x=>x.id===msg.sender_id);document.getElementById('msgInput').placeholder='回复 '+(u?u.nickname||u.username:'')+': '+(msg.content||'').substring(0,20);document.getElementById('msgInput').focus()}closeMsgMenu()}
function recallMsg(){const db=loadDB();const msg=db.messages.find(m=>m.id===menuMsgId);if(!msg||msg.sender_id!==user.id)return;if(Date.now()-new Date(msg.created_at).getTime()>120000){showToast('只能撤回2分钟内的消息');closeMsgMenu();return}msg.recalled=true;msg.content='';msg.type='recall';saveDB(db);if(curChatType==='friend'){const c=connections[curChat.id];if(c&&c.open)c.send({type:'msg-recall',msgId:msg.id,fromId:user.id})}loadMessages();closeMsgMenu()}
function deleteMsg(){if(!confirm('删除消息？'))return;const db=loadDB();db.messages=db.messages.filter(m=>m.id!==menuMsgId);saveDB(db);const el=document.getElementById('msg-'+menuMsgId);if(el)el.parentElement.remove();closeMsgMenu()}
function favMsg(){const db=loadDB();const msg=db.messages.find(m=>m.id===menuMsgId);if(msg&&!favorites.find(f=>f.id===msg.id)){favorites.push({...msg,favAt:new Date().toISOString()});saveFav();showToast('已收藏')}closeMsgMenu()}
function forwardMsg(){closeMsgMenu();forwardMsgIds=[menuMsgId];doForwardUI()}
let forwardMsgIds=[];
function doForwardUI(){const db=loadDB();const fids=db.friendships.filter(f=>(f.user_id===user.id||f.friend_id===user.id)&&f.status==='accepted').map(f=>f.user_id===user.id?f.friend_id:f.user_id);const friends=db.users.filter(u=>fids.includes(u.id));const groups=db.groups.filter(g=>g.members.includes(user.id));let html='<h3>转发给</h3>';groups.forEach(g=>{html+=`<div class="forward-item" onclick="doForward('group',${g.id})"><div class="avatar av-group" style="width:36px;height:36px;font-size:14px;margin-right:10px">👥</div><div>${esc(g.name)}</div></div>`});friends.forEach(f=>{html+=`<div class="forward-item" onclick="doForward('friend',${f.id})"><div class="avatar ${avClass(f.id)}" style="width:36px;height:36px;font-size:14px;margin-right:10px">${(f.nickname||f.username)[0]}</div><div>${esc(getDisplayName(f))}</div></div>`});document.getElementById('forwardBox').innerHTML=html;document.getElementById('forwardPanel').classList.add('active')}
function closeForward(){document.getElementById('forwardPanel').classList.remove('active')}
function doForward(type,id){const db=loadDB();forwardMsgIds.forEach(mid=>{const orig=db.messages.find(m=>m.id===mid);if(!orig)return;if(type==='friend'){const fwd={id:Date.now()+Math.random(),sender_id:user.id,receiver_id:id,content:'[转发] '+(orig.content||''),type:orig.type,voiceData:orig.voiceData,imageData:orig.imageData,locationData:orig.locationData,rpData:orig.rpData,cardData:orig.cardData,duration:orig.duration,created_at:new Date().toISOString(),read:false,delivered:false,readByReceiver:false};db.messages.push(fwd);saveDB(db);const c=connections[id];if(c&&c.open){c.send({type:'message',msg:fwd});fwd.delivered=true;saveDB(db)}}else{const fwd={id:Date.now()+Math.random(),sender_id:user.id,group_id:id,content:'[转发] '+(orig.content||''),type:orig.type,voiceData:orig.voiceData,imageData:orig.imageData,locationData:orig.locationData,rpData:orig.rpData,cardData:orig.cardData,duration:orig.duration,created_at:new Date().toISOString(),read:false,delivered:false};db.messages.push(fwd);saveDB(db);const grp=db.groups.find(g=>g.id===id);if(grp)grp.members.forEach(mid2=>{if(mid2!==user.id){const c=connections[mid2];if(c&&c.open)c.send({type:'group-msg',msg:fwd,groupId:id})}})}});closeForward();showToast('转发成功')}

function onImagePicked(event){const file=event.target.files[0];if(!file)return;event.target.value='';const reader=new FileReader();reader.onload=function(e){const img=new Image();img.onload=function(){const canvas=document.createElement('canvas');const MAX=1200;let w=img.width,h=img.height;if(w>MAX||h>MAX){if(w>h){h=h*MAX/w;w=MAX}else{w=w*MAX/h;h=MAX}}canvas.width=w;canvas.height=h;canvas.getContext('2d').drawImage(img,0,0,w,h);sendImageMsg(canvas.toDataURL('image/jpeg',0.7))};img.src=e.target.result};reader.readAsDataURL(file)}

function sendRedPacket(){if(!curChat)return;const greeting=prompt('红包祝福语：','恭喜发财');if(!greeting)return;const amount=parseFloat(prompt('金额（元）：','1'));if(isNaN(amount)||amount<=0){showToast('请输入有效金额');return}const rpData={greeting,amount:amount.toFixed(2),senderId:user.id,senderName:user.nickname||user.username,claimed:[]};const msg={id:Date.now(),sender_id:user.id,content:'🧧 红包',type:'redpacket',rpData,created_at:new Date().toISOString(),read:false,delivered:false,readByReceiver:false};if(curChatType==='friend'){msg.receiver_id=curChat.id;const db=loadDB();db.messages.push(msg);saveDB(db);const c=connections[curChat.id];if(c&&c.open){c.send({type:'message',msg});msg.delivered=true;saveDB(db)}else queueMessage(msg)}else{msg.group_id=curChat.id;const db=loadDB();db.messages.push(msg);saveDB(db);curChat.members.forEach(mid=>{if(mid!==user.id){const c=connections[mid];if(c&&c.open)c.send({type:'group-msg',msg,groupId:curChat.id})}})}document.getElementById('msgList').innerHTML+=msgHTML(msg);scrollMsgs()}
function openRedPacket(msgId){const db=loadDB();const msg=db.messages.find(m=>m.id===msgId);if(!msg||!msg.rpData)return;if(msg.rpData.claimed&&msg.rpData.claimed.some(c=>c.userId===user.id)){showToast('已领取过');return}const myAmount=Math.round((msg.rpData.amount/curChatType==='group'?(curChat.members.length-1):1)*100)/100;msg.rpData.claimed=msg.rpData.claimed||[];msg.rpData.claimed.push({userId:user.id,amount:myAmount});saveDB(db);if(curChatType==='friend'){const c=connections[curChat.id];if(c&&c.open)c.send({type:'redpacket-claim',rpId:msg.id,claimId:user.id,amount:myAmount})}else{curChat.members.forEach(mid=>{if(mid!==user.id){const c=connections[mid];if(c&&c.open)c.send({type:'redpacket-claim',rpId:msg.id,claimId:user.id,amount:myAmount})}})}showToast('领取了'+myAmount+'元');loadMessages()}
