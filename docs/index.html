let mediaRecorder=null,audioChunks=[],recordingStartTime=0,recordingTimer=null,isRecording=false;
function toggleRecording(){if(isRecording){sendVoiceMsg();return}startRecording()}
async function startRecording(){try{const stream=await navigator.mediaDevices.getUserMedia({audio:true});const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);const mimeType=isIOS&&MediaRecorder.isTypeSupported('audio/mp4')?'audio/mp4':MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':'audio/webm';mediaRecorder=new MediaRecorder(stream,{mimeType});audioChunks=[];mediaRecorder.ondataavailable=e=>{if(e.data.size>0)audioChunks.push(e.data)};mediaRecorder.start();recordingStartTime=Date.now();isRecording=true;document.getElementById('micBtn').textContent='🔴';document.getElementById('recordingBar').classList.add('active');recordingTimer=setInterval(()=>{const s=Math.floor((Date.now()-recordingStartTime)/1000);document.getElementById('recTime').textContent=Math.floor(s/60)+':'+String(s%60).padStart(2,'0')},1000)}catch(e){showToast('请允许访问麦克风')}}
function cancelRecording(){if(mediaRecorder&&mediaRecorder.state==='recording')mediaRecorder.stop();isRecording=false;document.getElementById('micBtn').textContent='🎤';document.getElementById('recordingBar').classList.remove('active');clearInterval(recordingTimer)}
async function sendVoiceMsg(){if(!isRecording||!curChat)return;const duration=Date.now()-recordingStartTime;if(duration<500){cancelRecording();return}const recordedMime=mediaRecorder.mimeType||'audio/webm';mediaRecorder.onstop=async()=>{const blob=new Blob(audioChunks,{type:recordedMime});const reader=new FileReader();reader.onload=()=>{const base64=reader.result;const msg={id:Date.now(),sender_id:user.id,content:'🎤 语音消息',type:'voice',voiceData:base64,duration,created_at:new Date().toISOString(),read:false,delivered:false,readByReceiver:false};if(curChatType==='friend'){msg.receiver_id=curChat.id;const db=loadDB();db.messages.push(msg);saveDB(db);if(!connections[curChat.id]||!connections[curChat.id].open)connectToPeer(curChat.id);const c=connections[curChat.id];if(c&&c.open){c.send({type:'message',msg});msg.delivered=true;saveDB(db)}else queueMessage(msg)}else{msg.group_id=curChat.id;const db=loadDB();db.messages.push(msg);saveDB(db);curChat.members.forEach(mid=>{if(mid!==user.id){const c=connections[mid];if(c&&c.open)c.send({type:'group-msg',msg,groupId:curChat.id})}})}document.getElementById('msgList').innerHTML+=msgHTML(msg);scrollMsgs()};reader.readAsDataURL(blob);mediaRecorder.stream.getTracks().forEach(t=>t.stop())};mediaRecorder.stop();isRecording=false;document.getElementById('micBtn').textContent='🎤';document.getElementById('recordingBar').classList.remove('active');clearInterval(recordingTimer)}
function playVoice(msgId){const db=loadDB();const msg=db.messages.find(m=>m.id==msgId);if(!msg||!msg.voiceData)return;const btn=document.getElementById('play-'+msgId);if(btn)btn.textContent='⏸';try{const audio=new Audio();audio.src=msg.voiceData;audio.setAttribute('playsinline','');audio.setAttribute('webkit-playsinline','');const playPromise=audio.play();if(playPromise&&playPromise.catch){playPromise.catch(e=>{console.log('Voice play failed, retrying...',e);audio.muted=true;audio.play().then(()=>{audio.muted=false}).catch(()=>{});if(btn)btn.textContent='▶'})}audio.onended=()=>{if(btn)btn.textContent='▶'};audio.onerror=()=>{if(btn)btn.textContent='▶'}}catch(e){if(btn)btn.textContent='▶';showToast('无法播放语音')}}

// ===== Chat Menu =====

function playRingtone(){try{ringtoneCtx=new(window.AudioContext||window.webkitAudioContext)();if(ringtoneCtx.state==='suspended')ringtoneCtx.resume();function beep(){try{if(!ringtoneCtx||ringtoneCtx.state==='closed')return;ringtoneOsc=ringtoneCtx.createOscillator();const g=ringtoneCtx.createGain();ringtoneOsc.connect(g);g.connect(ringtoneCtx.destination);ringtoneOsc.frequency.value=440;ringtoneOsc.type='sine';g.gain.value=0.3;ringtoneOsc.start();ringtoneOsc.stop(ringtoneCtx.currentTime+0.3)}catch(e){}}beep();ringtoneInterval=setInterval(beep,1500)}catch(e){}}
function stopRingtone(){if(ringtoneInterval){clearInterval(ringtoneInterval);ringtoneInterval=null}if(ringtoneOsc){try{ringtoneOsc.stop()}catch(e){}}if(ringtoneCtx){try{ringtoneCtx.close()}catch(e){}}}

async function startVoiceCall(){
  if(!curChat||curChatType!=='friend')return;
  if(!myPeer||!myPeer.open){showToast('网络未连接，请稍后重试');return}
  try{localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:false})}catch(e){showToast('请允许访问麦克风');return}
  currentCallType='voice';setupRemoteAudio();
  document.getElementById('vcAvatar').textContent=getDisplayName(curChat)[0];
  document.getElementById('vcAvatar').className='voice-call-avatar ringing '+avClass(curChat.id);
  document.getElementById('vcName').textContent=getDisplayName(curChat);
  document.getElementById('vcStatus').textContent='正在呼叫...';
  document.getElementById('vcDuration').style.display='none';
  show('voiceCallScreen');
  const call=myPeer.call('friendapp-user-'+curChat.id,localStream,{metadata:{type:'voice',callerId:user.id}});
  if(!call){showToast('呼叫失败');endVoiceCall();return}
  currentMediaCall=call;

function setupRemoteAudio(){let a=document.getElementById('remoteAudio');if(!a){a=document.createElement('audio');a.id='remoteAudio';a.setAttribute('playsinline','');a.setAttribute('webkit-playsinline','');a.style.display='none';document.body.appendChild(a)}a.muted=false;a.volume=1.0}
function attachRemoteStream(stream){
  let a=document.getElementById('remoteAudio');if(!a){setupRemoteAudio();a=document.getElementById('remoteAudio')}
  if(!a)return;a.srcObject=stream;a.muted=false;a.volume=1.0;
  const tp=()=>{const p=a.play();if(p&&p.catch)p.catch(()=>{})};
  tp();setTimeout(tp,300);setTimeout(tp,1000);setTimeout(tp,3000);
  const unlock=()=>{tp();document.body.removeEventListener('click',unlock);document.body.removeEventListener('touchstart',unlock2)};
  const unlock2=()=>{tp();document.body.removeEventListener('click',unlock);document.body.removeEventListener('touchstart',unlock2)};
  document.body.addEventListener('click',unlock,{once:true});document.body.addEventListener('touchstart',unlock2,{once:true});
}

let shakeListener=null,shakeCount=0,shakeTimer=null,isShaking=false;
function startShake(){
  isShaking=true;shakeCount=0;
  const overlay=document.createElement('div');
  overlay.id='shakeOverlay';
  overlay.style.cssText='position:fixed;inset:0;background:linear-gradient(180deg,#1e293b,#0f172a);color:#fff;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center';
  overlay.innerHTML=`<button onclick="closeShake()" style="position:absolute;top:16px;left:16px;background:none;border:none;color:#fff;font-size:20px;cursor:pointer">✕</button>
    <div id="shakePhone" style="font-size:80px;transition:transform .3s">📱</div>
    <p style="margin-top:16px;font-size:16px" id="shakeText">摇动手机或点击屏幕</p>
    <div style="margin-top:20px;width:200px;height:6px;background:rgba(255,255,255,.2);border-radius:3px;overflow:hidden"><div id="shakeProgress" style="width:0%;height:100%;background:#07c160;border-radius:3px;transition:width .3s"></div></div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click',onShakeClick);
  // DeviceMotion
  if(window.DeviceMotionEvent){
    try{
      if(typeof DeviceMotionEvent.requestPermission==='function'){
        DeviceMotionEvent.requestPermission().then(s=>{if(s==='granted')addShakeListener()}).catch(()=>{})
      }else{addShakeListener()}
    }catch(e){}
  }
}
function addShakeListener(){
  let lastX=0,lastY=0,lastZ=0;
  shakeListener=function(e){
    const a=e.accelerationIncludingGravity;if(!a)return;
    const dx=a.x-lastX,dy=a.y-lastY,dz=a.z-lastZ;
    lastX=a.x;lastY=a.y;lastZ=a.z;
    const speed=Math.sqrt(dx*dx+dy*dy+dz*dz);
    if(speed>20)onShakeDetected();
  };
  window.addEventListener('devicemotion',shakeListener);
}
function onShakeClick(){onShakeDetected()}
function onShakeDetected(){
  if(!isShaking)return;
  shakeCount++;
  const p=Math.min(100,shakeCount*20);
  document.getElementById('shakeProgress').style.width=p+'%';
  const phone=document.getElementById('shakePhone');
  phone.style.transform='rotate('+(Math.random()*40-20)+'deg)';
  setTimeout(()=>{phone.style.transform='rotate('+(Math.random()*20-10)+'deg)'},200);
  if(shakeCount>=5){
    isShaking=false;
    document.getElementById('shakeText').textContent='🔍 匹配中...';
    setTimeout(()=>shakeMatch(),800);
  }
}
function shakeMatch(){
  const db=loadDB();
  const onlineIds=Array.from(onlinePeers).filter(id=>id!==user.id);
  let match;
  if(onlineIds.length){match=db.users.find(u=>onlineIds.includes(u.id))}
  else{const others=db.users.filter(u=>u.id!==user.id);match=others[Math.floor(Math.random()*others.length)]}
  if(!match){document.getElementById('shakeText').textContent='未找到用户，稍后再试';return}
  const name=match.nickname||match.username;
  document.getElementById('shakeText').textContent='找到了！';
  document.getElementById('shakePhone').style.fontSize='40px';
  document.getElementById('shakePhone').textContent='🎉';
  const ov=document.getElementById('shakeOverlay');
  ov.innerHTML=`<button onclick="closeShake()" style="position:absolute;top:16px;left:16px;background:none;border:none;color:#fff;font-size:20px;cursor:pointer">✕</button>
    <div style="font-size:60px;margin-bottom:16px">🎉</div>
    <div class="avatar ${avClass(match.id)}" style="width:80px;height:80px;font-size:32px;margin-bottom:12px">${name[0]}</div>
    <h2 style="font-size:20px;margin-bottom:4px">${esc(name)}</h2>
    <p style="color:#94a3b8;margin-bottom:24px">@${match.username}</p>
    <div style="display:flex;gap:12px">
      <button onclick="greetFromShake(${match.id})" style="background:#07c160;color:#fff;border:none;padding:12px 32px;border-radius:24px;font-size:16px;cursor:pointer">👋 打招呼</button>
      <button onclick="addFriendFromShake(${match.id})" style="background:#576b95;color:#fff;border:none;padding:12px 32px;border-radius:24px;font-size:16px;cursor:pointer">➕ 加好友</button>
    </div>`;
}

function throwBottle(){
  const msg=prompt('写点什么，扔进大海...');if(!msg||!msg.trim())return;
  const bottle={id:Date.now(),userId:user.id,username:user.username,nickname:user.nickname||user.username,content:msg.trim(),createdAt:new Date().toISOString(),claimed:false};
  const bottles=getBottles();bottles.push(bottle);saveBottles(bottles);
  // 通过P2P分享瓶子
  Object.keys(connections).forEach(fid=>{const c=connections[fid];if(c&&c.open)c.send({type:'bottle-new',bottle})});
  showToast('瓶子已扔进大海 🌊');
  const main=document.getElementById('bottleMain');if(main)main.innerHTML=`<div style="font-size:60px;margin-bottom:16px">🌊</div><p style="font-size:16px;margin-bottom:24px">瓶子已扔出，等待有缘人捡到</p><button onclick="closeBottle()" style="background:rgba(255,255,255,.15);color:#fff;border:none;padding:12px 28px;border-radius:24px;font-size:15px;cursor:pointer">返回</button>`;
}

function pickBottle(){
  const bottles=getBottles().filter(b=>b.userId!==user.id&&!b.claimed);
  if(!bottles.length){showToast('海里暂无瓶子，稍后再来');return}
  const bottle=bottles[Math.floor(Math.random()*bottles.length)];
  bottle.claimed=true;saveBottles(getBottles().map(b=>b.id===bottle.id?bottle:b));
  const main=document.getElementById('bottleMain');
  if(main)main.innerHTML=`<div style="font-size:60px;margin-bottom:16px">🍾</div>
    <div style="background:rgba(255,255,255,.1);border-radius:16px;padding:20px;width:100%;margin-bottom:20px">
      <div style="display:flex;align-items:center;margin-bottom:12px">
        <div class="avatar ${avClass(bottle.userId)}" style="width:36px;height:36px;font-size:14px;margin-right:10px">${(bottle.nickname||'?')[0]}</div>
        <div><div style="font-size:14px;font-weight:600">${esc(bottle.nickname)}</div><div style="font-size:11px;color:#64748b">${new Date(bottle.createdAt).toLocaleDateString('zh-CN')}</div></div>
      </div>
      <p style="font-size:16px;line-height:1.6">${esc(bottle.content)}</p>
    </div>
    <div style="display:flex;gap:12px">
      <button onclick="replyBottle(${bottle.userId})" style="background:#07c160;color:#fff;border:none;padding:12px 24px;border-radius:24px;font-size:15px;cursor:pointer;font-weight:600">💬 回复</button>
      <button onclick="pickBottle()" style="background:rgba(255,255,255,.15);color:#fff;border:none;padding:12px 24px;border-radius:24px;font-size:15px;cursor:pointer">🍾 再捡一个</button>
    </div>`;
}

function replyBottle(userId){
  closeBottle();
  const db=loadDB();
  const isFriend=db.friendships.some(f=>(f.user_id===user.id&&f.friend_id===userId||f.user_id===userId&&f.friend_id===user.id)&&f.status==='accepted');
  if(!isFriend){db.friendships.push({id:db.nextId++,user_id:user.id,friend_id:userId,status:'accepted'});saveDB(db);connectToPeer(userId)}
  openChat('friend-'+userId);
  setTimeout(()=>{document.getElementById('msgInput').value='🍾 漂流瓶回复：';onMsgInput()},300);
}

// ===== 附近的人 =====
function showNearby(){
  const db=loadDB();
  const online=db.users.filter(u=>u.id!==user.id&&onlinePeers.has(u.id));
  const offline=db.users.filter(u=>u.id!==user.id&&!onlinePeers.has(u.id));
  let html=`<div style="padding:12px 16px;display:flex;align-items:center;border-bottom:1px solid #e0e0e0;background:#fff"><button style="background:none;border:none;font-size:20px;cursor:pointer" onclick="renderDiscover()">‹</button><span style="flex:1;text-align:center;font-size:16px;font-weight:500">附近的人</span><div style="width:28px"></div></div>`;
  if(online.length){html+='<div style="padding:8px 16px;color:#07c160;font-size:12px">🟢 在线</div>';online.forEach(u=>{html+=`<div class="friend-item" onclick="showProfile(${u.id})"><div class="avatar ${avClass(u.id)}">${(u.nickname||u.username)[0]}</div><div style="flex:1"><div class="friend-name">${esc(u.nickname||u.username)}</div><div style="font-size:12px;color:#999">@${u.username}</div></div></div>`})}
  if(offline.length){html+='<div style="padding:8px 16px;color:#999;font-size:12px">⚫ 离线</div>';offline.forEach(u=>{html+=`<div class="friend-item" onclick="showProfile(${u.id})"><div class="avatar ${avClass(u.id)}" style="opacity:.5">${(u.nickname||u.username)[0]}</div><div style="flex:1"><div class="friend-name" style="color:#999">${esc(u.nickname||u.username)}</div></div></div>`})}
  if(!online.length&&!offline.length)html+='<div class="empty"><div class="icon">📍</div><p>附近暂无用户</p></div>';
  document.getElementById('tabContent').innerHTML=html;
}

// ===== P2P 数据类型扩展 =====
// 在 handleDataConnection 中补充漂流瓶相关
const _origHandleDC=handleDataConnection;
handleDataConnection=function(conn){
  const ruid=parseInt(conn.peer.replace('friendapp-user-',''));
  connections[ruid]=conn;onlinePeers.add(ruid);
  conn.on('data',data=>{
    switch(data.type){
      case 'online':onlinePeers.add(data.userId);updateStatus();deliverPendingMessages(data.userId);const db=loadDB();conn.send({type:'db-sync',db});break;
      case 'message':receiveMessage(data);break;
      case 'db-sync':mergeDB(data.db);break;
      case 'messages-batch':(data.messages||[]).forEach(m=>receiveMessage({msg:m},true));break;
      case 'msg-ack':{const d2=loadDB();const m=d2.messages.find(x=>x.id===data.msgId);if(m){m.delivered=true;saveDB(d2)}break}
      case 'msg-read':{const d3=loadDB();d3.messages.filter(m=>m.sender_id===user.id&&m.receiver_id===data.fromId&&!m.readByReceiver).forEach(m=>m.readByReceiver=true);saveDB(d3);if(curChat&&curChatType==='friend'&&curChat.id===data.fromId)loadMessages();break}
      case 'search-request':handleSearchRequest(conn,data);break;
      case 'search-response':handleSearchResponse(data);break;
      case 'call-reject':showToast('对方拒绝了通话');break;
      case 'call-offer':{if(!document.getElementById('incomingCall').classList.contains('active')){const ct2=data.callType||'voice';showIncomingCall(data.callerName||'未知',null,ct2)}break}
      case 'typing':if(curChat&&curChat.id===data.fromId&&curChatType==='friend'){document.getElementById('typingIndicator').textContent='对方正在输入...';clearTimeout(window._tt);window._tt=setTimeout(()=>{document.getElementById('typingIndicator').textContent=''},3000)}break;
      case 'msg-recall':{const d4=loadDB();const m=d4.messages.find(x=>x.id===data.msgId);if(m){m.recalled=true;m.content='';m.type='recall';saveDB(d4);if(curChat)loadMessages()}break}
      case 'group-msg':receiveGroupMsg(data);break;
      case 'nickname-update':{const d5=loadDB();const u=d5.users.find(x=>x.id===data.userId);if(u){u.nickname=data.nickname;saveDB(d5)}break}
      case 'nudge':showToast(data.fromName+' 拍了拍你');if(curChat&&curChat.id===data.fromId&&curChatType==='friend'){const d6=loadDB();const nm={id:Date.now(),sender_id:data.fromId,receiver_id:user.id,type:'nudge',content:'拍了拍你',created_at:new Date().toISOString()};d6.messages.push(nm);saveDB(d6);loadMessages()}break;
      case 'redpacket-claim':{const d7=loadDB();const rp=d7.messages.find(m=>m.id===data.rpId);if(rp&&rp.rpData){if(!rp.rpData.claimed)rp.rpData.claimed=[];if(!rp.rpData.claimed.find(c=>c.userId===data.claimId)){rp.rpData.claimed.push({userId:data.claimId,amount:data.amount});saveDB(d7);if(curChat)loadMessages()}}break}
      case 'bottle-sync-request':{const myBottles=getBottles().filter(b=>b.userId===user.id);if(myBottles.length&&conn.open)conn.send({type:'bottle-sync-response',bottles:myBottles});break}
      case 'bottle-sync-response':{const existing=getBottles();data.bottles.forEach(b=>{if(!existing.find(e=>e.id===b.id)){existing.push(b)}});saveBottles(existing);break}
      case 'bottle-new':{const existing=getBottles();if(!existing.find(e=>e.id===data.bottle.id)){existing.push(data.bottle);saveBottles(existing)}break}
      case 'user-info-request':{const d8=loadDB();const me=d8.users.find(u=>u.id===user.id);if(conn.open)conn.send({type:'user-info-response',userId:user.id,username:me.username,nickname:me.nickname,friendIds:d8.friendships.filter(f=>(f.user_id===user.id||f.friend_id===user.id)&&f.status==='accepted').map(f=>f.user_id===user.id?f.friend_id:f.user_id)});if(!d8.users.find(u=>u.id===data.fromUserId)){d8.users.push({id:data.fromUserId,username:data.fromUsername,nickname:data.fromNickname,password:'',avatar:'',remark:{}});d8.nextId=Math.max(d8.nextId,data.fromUserId+1);saveDB(d8)}break}
      case 'user-info-response':{const d9=loadDB();if(!d9.users.find(u=>u.id===data.userId)){d9.users.push({id:data.userId,username:data.username,nickname:data.nickname,password:'',avatar:'',remark:{}});d9.nextId=Math.max(d9.nextId,data.userId+1);saveDB(d9)}if(data.friendIds){data.friendIds.forEach(fid=>{if(!d9.users.find(u=>u.id===fid)){const tmpC=connections[fid];if(tmpC&&tmpC.open)tmpC.send({type:'user-info-request',fromUserId:user.id,fromUsername:user.username,fromNickname:user.nickname})}})}if(currentSearchQuery)refreshSearchDisplay();break}
      case 'friend-request':{const d10=loadDB();if(!d10.users.find(u=>u.id===data.fromUserId)){d10.users.push({id:data.fromUserId,username:data.fromUsername,nickname:data.fromNickname,password:'',avatar:'',remark:{}});d10.nextId=Math.max(d10.nextId,data.fromUserId+1);saveDB(d10)}if(!d10.friendships.find(f=>(f.user_id===user.id&&f.friend_id===data.fromUserId)||(f.user_id===data.fromUserId&&f.friend_id===user.id))){d10.friendships.push({id:d10.nextId++,user_id:data.fromUserId,friend_id:user.id,status:'pending'});saveDB(d10);showToast(data.fromNickname+' 请求添加你为好友')}break}
      case 'friend-accept':{const d11=loadDB();if(!d11.users.find(u=>u.id===data.fromUserId)){d11.users.push({id:data.fromUserId,username:data.fromUsername,nickname:data.fromNickname,password:'',avatar:'',remark:{}});d11.nextId=Math.max(d11.nextId,data.fromUserId+1);saveDB(d11)}const req=d11.friendships.find(f=>f.user_id===user.id&&f.friend_id===data.fromUserId&&f.status==='pending');if(req){req.status='accepted';saveDB(d11);connectToPeer(data.fromUserId);showToast(data.fromNickname+' 接受了你的好友请求')}break}
    }
  });
  conn.on('close',()=>{delete connections[ruid];onlinePeers.delete(ruid);updateStatus()});
  conn.on('error',e=>console.error(e));
  if(curChat&&curChat.id===ruid&&curChatType==='friend')document.getElementById('chatStatus').textContent='🟢 在线';
};

if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(e=>console.log('SW注册失败',e))}

// ===== 自动登录：只要不主动退出，后台自动登录 =====
const savedUser=localStorage.getItem('friendAppUser');
if(savedUser){try{const su=JSON.parse(savedUser);const db=loadDB();const exists=db.users.find(u=>u.id===su.id&&u.username===su.username);if(exists){user=su;enterApp()}else{localStorage.removeItem('friendAppUser');show('loginScreen')}}catch{localStorage.removeItem('friendAppUser');show('loginScreen')}}else{show('loginScreen')}
</script>
